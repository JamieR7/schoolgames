<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cargo 🚀 | School Games</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,800;0,900;1,400;1,800;1,900&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --space-bg: #020617;
            --neon-blue: #22d3ee;
            --neon-orange: #f97316;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--space-bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(1.5px 1.5px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 100px 100px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 150px 250px, #94a3b8, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 300px 50px, #fff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: stars-drift 240s linear infinite;
        }

        @keyframes stars-drift {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 1000px 1000px;
            }
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .space-card {
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5), 0 50px 100px -20px rgba(0, 0, 0, 0.8);
        }

        /* 3D Crate Styling (v2) */
        .premium-crate {
            transform-style: preserve-3d;
            perspective: 1200px;
        }

        .crate-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border-radius: 6px;
            backface-visibility: hidden;
        }

        .front {
            background: linear-gradient(135deg, var(--crate-color), var(--crate-dark));
            transform: translateZ(12px);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        }

        .top {
            background: var(--crate-light);
            height: 24px;
            top: -12px;
            transform: rotateX(90deg) translateZ(12px);
            opacity: 0.9;
        }

        .right {
            background: var(--crate-dark);
            width: 24px;
            right: -12px;
            transform: rotateY(90deg) translateZ(12px);
            opacity: 0.8;
        }

        .premium-crate.hover {
            transform: translateZ(20px) scale(1.1);
            filter: brightness(1.2);
            z-index: 100;
        }

        .space-btn {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.1em;
        }

        .space-btn:hover {
            transform: translateY(-2px);
            background: white !important;
            color: black !important;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .space-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .animate-shake {
            animation: shake 0.2s 3;
        }

        @keyframes sticker-pop {
            0% {
                transform: scale(0.1);
                opacity: 0;
            }

            40% {
                transform: scale(1.2) rotate(-5deg);
                opacity: 1;
            }

            60% {
                transform: scale(1.2) rotate(5deg);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            animation: sticker-pop 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 20s linear infinite;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            padding: 0.7rem 1.4rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #22d3ee;
            color: #020617;
            border-color: #22d3ee;
            transform: scale(1.05);
        }

        /* Custom Scrollbar for Dashboard */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="antialiased">
    <a href="../index.html" class="back-btn">← Exit Hangar</a>
    <div id="root"></div>

    <script type="text/babel" src="game.js"></script>
</body>

</html>
