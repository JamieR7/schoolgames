<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✂️ Half It! Maths Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdf4ff;
            background-image: radial-gradient(#e9d5ff 2px, transparent 2px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 4rem;
            color: #1f2937;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid #d8b4fe;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #7c3aed;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #fdf4ff;
            border-radius: 9999px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #6d28d9;
            border: 2px solid #e9d5ff;
        }

        .header-stickers {
            display: flex;
            gap: 0.3rem;
            font-size: 1.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #5b21b6;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.9rem;
            color: #6d28d9;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .progress-bar {
            background: white;
            border: 4px solid #d8b4fe;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        .stickers {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 4px solid #ddd6fe;
            display: none;
        }

        .stickers.visible {
            display: block;
        }

        .stickers-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #8b5cf6;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sticker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 2rem;
        }

        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            outline: 4px solid #d8b4fe;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: #7c3aed;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.9rem;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .big-number {
            font-size: clamp(4rem, 12vw, 7rem);
            font-weight: 900;
            color: #7c3aed;
            margin: 1rem 0;
            line-height: 1;
        }

        .instruction {
            font-size: 1.2rem;
            font-weight: 800;
            color: #374151;
            margin-bottom: 1.5rem;
        }

        .instruction span {
            color: #7c3aed;
            background: #f5f3ff;
            border-radius: 0.5rem;
            padding: 0.1rem 0.4rem;
        }

        .tree-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .tree-top {
            font-size: 2.5rem;
            font-weight: 900;
            color: #7c3aed;
            background: #f5f3ff;
            border: 4px solid #c4b5fd;
            border-radius: 1.5rem;
            padding: 0.5rem 2rem;
            margin-bottom: 0.5rem;
        }

        .htu-row,
        .half-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .htu-block,
        .half-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .htu-label,
        .half-label {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .htu-value {
            font-size: 1.8rem;
            font-weight: 900;
            background: white;
            border: 4px solid;
            border-radius: 1rem;
            padding: 0.3rem 1rem;
            min-width: 4rem;
        }

        .htu-value.h {
            border-color: #3b82f6;
            color: #1d4ed8;
        }

        .htu-value.t {
            border-color: #f97316;
            color: #c2410c;
        }

        .htu-value.u {
            border-color: #10b981;
            color: #065f46;
        }

        .arrow-down {
            font-size: 1.5rem;
            color: #a855f7;
            margin: 0.3rem 0;
        }

        .half-input {
            font-family: inherit;
            font-size: 1.8rem;
            font-weight: 900;
            width: 5rem;
            text-align: center;
            border: 4px solid #c4b5fd;
            border-radius: 1rem;
            padding: 0.3rem;
            color: #7c3aed;
            outline: none;
            background: #f5f3ff;
        }

        .half-input:focus {
            border-color: #7c3aed;
        }

        .half-input.correct {
            border-color: #16a34a;
            color: #16a34a;
            background: #f0fdf4;
        }

        .half-input.wrong {
            border-color: #dc2626;
            color: #dc2626;
            background: #fef2f2;
        }

        .final-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .final-label {
            font-size: 1.2rem;
            font-weight: 800;
            color: #374151;
        }

        .final-input {
            font-family: inherit;
            font-size: 2.5rem;
            font-weight: 900;
            width: 7rem;
            text-align: center;
            border: 5px solid #c4b5fd;
            border-radius: 1.2rem;
            padding: 0.3rem;
            color: #7c3aed;
            outline: none;
            background: #f5f3ff;
        }

        .final-input.correct {
            border-color: #16a34a;
            color: #16a34a;
            background: #f0fdf4;
        }

        .final-input.wrong {
            border-color: #dc2626;
            color: #dc2626;
            background: #fef2f2;
        }

        .check-btn {
            font-family: inherit;
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(180deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 0.9rem 2.5rem;
            box-shadow: 0 6px 0 #4c1d95;
            text-transform: uppercase;
        }

        .check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #4c1d95;
        }

        .feedback {
            display: none;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-top: 1rem;
            text-align: center;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border: 3px solid #86efac;
            display: block;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border: 3px solid #fca5a5;
            display: block;
        }

        .feedback-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.3rem;
        }

        .feedback-msg {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .next-btn {
            font-family: inherit;
            font-size: 1rem;
            font-weight: 900;
            background: #7c3aed;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 0.6rem 1.8rem;
            box-shadow: 0 4px 0 #4c1d95;
            margin-top: 0.8rem;
            text-transform: uppercase;
        }

        #sticker-flash-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            display: none;
        }

        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2500;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(124, 58, 237, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .celebration.show {
            display: flex;
            animation: fadeIn 0.5s forwards;
        }

        .celebration-emoji {
            font-size: 8rem;
            margin-bottom: 1rem;
        }

        .celebration-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            color: #fdf4ff;
        }

        .sticker-reward {
            font-size: 6rem;
            margin: 1.5rem 0;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rare-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .rare-banner.show {
            display: flex;
            animation: fadeIn 0.4s forwards;
        }

        .rare-inner {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: 6px solid #fbbf24;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
        }

        .rare-emoji-big {
            font-size: 7rem;
            display: block;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes sticker-pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            display: block !important;
            animation: sticker-pop 1.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <header>
        <h1>✂️ Half It!</h1>
        <div class="stats">
            <div class="header-stickers" id="header-sticker-list"></div>
            <div class="stat-pill">⭐ <span id="score">0</span></div>
            <div class="stat-pill">🔥 <span id="streak">0</span></div>
        </div>
    </header>
    <a href="../index.html" class="back-btn">← Home</a>
    <div class="progress-wrap">
        <div class="progress-label"><span id="progress-text">Collecting: Stars ⭐</span><span id="progress-count">0 /
                5</span></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>
    <div class="stickers" id="sticker-book">
        <div class="stickers-label">Knowledge Collection:</div>
        <div class="sticker-row" id="sticker-row"></div>
    </div>
    <div class="card" id="game-area">
        <div class="badge" id="q-badge">Question 1</div>
        <p class="instruction">Find <span>half</span> of this number!</p>
        <div class="big-number" id="big-number">648</div>
        <div class="tree-wrap">
            <div class="tree-top" id="tree-top">648</div>
            <div class="arrow-down">▼</div>
            <div class="htu-row" id="htu-row"></div>
            <div class="arrow-down">▼</div>
            <div class="half-row" id="half-row"></div>
            <div class="arrow-down">▼</div>
        </div>
        <div class="final-wrap">
            <span class="final-label">Half of <span id="final-num">648</span> is...</span>
            <input type="number" class="final-input" id="final-input" placeholder="?" />
        </div>
        <button class="check-btn" id="check-btn" onclick="checkAnswer()">Check! ✨</button>
        <div class="feedback" id="feedback">
            <span class="feedback-emoji" id="feedback-emoji">🎉</span>
            <p class="feedback-msg" id="feedback-msg">Amazing!</p>
            <button class="next-btn" onclick="nextQuestion()">Next Question →</button>
        </div>
    </div>
    <div class="celebration" id="celebration">
        <div class="celebration-emoji" id="cel-emoji">🏆</div>
        <div class="celebration-title">Level Up! 🎉</div>
        <div class="celebration-sub" id="cel-sub">You got all 5 right!</div>
        <div class="sticker-reward" id="cel-sticker">⭐</div>
        <button class="check-btn" onclick="afterCelebration()" style="margin-top:1rem; box-shadow:none;">Keep Going!
            🚀</button>
    </div>
    <div class="rare-banner" id="rare-banner">
        <div class="rare-inner">
            <span class="rare-emoji-big" id="rare-emoji">💎</span>
            <div class="rare-title" style="color:white; text-shadow:2px 3px 0 #92400e;">RARE STICKER!</div>
            <div class="rare-subtitle" id="rare-name" style="font-size:1.5rem; font-weight:800; margin:1rem 0;">Diamond
            </div>
            <p style="font-size:1rem; font-weight:700; opacity:0.9; margin-bottom:2rem;">This one doesn't show up often
                — you're lucky! 🍀</p>
            <button class="check-btn" onclick="closeRare()" style="box-shadow:none; background:#92400e;">Amazing!
                🎉</button>
        </div>
    </div>
    <canvas id="fw-canvas"></canvas>
    <div id="sticker-flash-overlay"></div>

    <script>
        const THEMES = [
            { name: 'Real Madrid', emoji: '🏆', stickers: ['⚽', '🏟️', '🥅', '👟', '🏆', '🧤', '🥇', '📣', '🎽', '🧣', '🎖️', '🔵', '⬜', '🌟', '🎯'] },
            { name: 'Beyblade', emoji: '🌪️', stickers: ['🌪️', '💥', '🌀', '⚙️', '🔧', '🔥', '⚡', '💫', '🛸', '🎯', '💿', '🔩', '🎪', '🎰', '🌀'] },
            { name: 'Bruno', emoji: '🐶', stickers: ['🐶', '🦴', '🎾', '🐾', '🐕', '🥩', '🦮', '🥎', '🚿', '🐕‍🦺', '🌿', '🏡', '🎀'] },
            { name: 'Judo Master', emoji: '🥋', stickers: ['🥋', '💪', '🥇', '🤸', '⛩️', '🇯🇵', '🧘', '🏆', '💯', '🎖️', '🏯', '🌸', '🥁'] },
            { name: 'Agent P', emoji: '🦆', stickers: ['🦆', '🎩', '🎸', '🛠️', '🧪', '🎢', '📻', '🗺️', '⚙️', '🔩', '🔬', '🧲', '📡', '🎬', '🛩️'] },
            { name: 'Space', emoji: '🚀', stickers: ['🚀', '🌍', '🌙', '⭐', '🛸', '☄️', '🪐', '👨‍🚀', '🌠', '🔭', '🛰️', '💫', '🌌', '🌟'] },
        ];
        const RARE_STICKERS = [
            { emoji: '💎', name: 'Diamond' }, { emoji: '👑', name: 'Crown' },
            { emoji: '🐉', name: 'Dragon' }, { emoji: '🌈', name: 'Rainbow' }, { emoji: '🔮', name: 'Crystal Ball' },
            { emoji: '🍀', name: 'Lucky Clover' }, { emoji: '🦅', name: 'Eagle' }, { emoji: '🎆', name: 'Fireworks' },
            { emoji: '⚡', name: 'Lightning Bolt' }, { emoji: '🌙', name: 'Golden Moon' }, { emoji: '🎭', name: 'Magic Mask' },
            { emoji: '🐋', name: 'Blue Whale' }, { emoji: '🌋', name: 'Volcano' },
        ];
        const RARE_CHANCE = 0.2;

        function pickSticker() {
            if (Math.random() < RARE_CHANCE) {
                const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
                const available = RARE_STICKERS.filter(s => !rareOwned.includes(s.emoji));
                const pool = available.length > 0 ? available : RARE_STICKERS;
                const r = pool[Math.floor(Math.random() * pool.length)];
                if (!rareOwned.includes(r.emoji)) {
                    rareOwned.push(r.emoji);
                    sessionStorage.setItem('stickers_rare', JSON.stringify(rareOwned));
                }
                setTimeout(() => showRareBanner(r), 500);
                return r.emoji;
            }
            const theme = THEMES[level % THEMES.length];
            return theme.stickers[Math.floor(Math.random() * theme.stickers.length)];
        }
        function updateStickerHeader() {
            const list = document.getElementById('header-sticker-list');
            if (!list) return;
            list.innerHTML = "";
            const rareBound = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
            const all = [...stickers.slice(-5), ...rareBound.slice(-5)].slice(-5);
            all.forEach(s => {
                const span = document.createElement('span');
                span.textContent = s;
                list.appendChild(span);
            });
        }
        function showRareBanner(r) {
            document.getElementById('rare-emoji').textContent = r.emoji;
            document.getElementById('rare-name').textContent = r.name;
            document.getElementById('rare-banner').classList.add('show');
            launchFireworks();
            playRareFanfare();
        }
        function playRareFanfare() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (!ctx) return;
                const now = ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    gain.gain.setValueAtTime(0.2, now + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.3);
                });
            } catch (e) { }
        }
        function showStickerFlash(emoji) {
            const overlay = document.getElementById('sticker-flash-overlay');
            overlay.textContent = emoji;
            overlay.classList.remove('animate-sticker-pop');
            void overlay.offsetWidth;
            overlay.classList.add('animate-sticker-pop');
        }
        function closeRare() {
            document.getElementById('rare-banner').classList.remove('show');
            stopFireworks();
        }
        let fwAnim = null, fwParticles = [], fwInterval = null;
        function fwBurst(canvas) {
            const colors = ['#fbbf24', '#ec4899', '#3b82f6', '#10b981', '#f97316', '#8b5cf6', '#ef4444', '#fff'];
            for (let i = 0; i < 8; i++) {
                const cx = Math.random() * canvas.width, cy = Math.random() * canvas.height * 0.7;
                for (let j = 0; j < 55; j++) {
                    const angle = (j / 55) * Math.PI * 2, spd = 2 + Math.random() * 7;
                    fwParticles.push({ x: cx, y: cy, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)], r: 2 + Math.random() * 4 });
                }
            }
        }
        function launchFireworks() {
            const canvas = document.getElementById('fw-canvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            fwParticles = []; fwBurst(canvas);
            function tick() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                fwParticles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= 0.005;
                    ctx.globalAlpha = Math.max(0, p.alpha); ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = 1; fwParticles = fwParticles.filter(p => p.alpha > 0);
                fwAnim = requestAnimationFrame(tick);
            }
            if (fwAnim) cancelAnimationFrame(fwAnim);
            fwAnim = requestAnimationFrame(tick);
            if (fwInterval) clearInterval(fwInterval);
            fwInterval = setInterval(() => fwBurst(canvas), 800);
        }
        function stopFireworks() {
            if (fwInterval) { clearInterval(fwInterval); fwInterval = null; }
            if (fwAnim) { cancelAnimationFrame(fwAnim); fwAnim = null; }
            const c = document.getElementById('fw-canvas');
            if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
            fwParticles = [];
        }

        const EVEN_3_DIGIT = [];
        for (let h = 1; h <= 9; h++) for (let t of [0, 2, 4, 6, 8]) for (let u of [0, 2, 4, 6, 8]) EVEN_3_DIGIT.push(h * 100 + t * 10 + u);
        const EVEN_2_DIGIT = [48, 92, 56, 74, 36, 82, 68, 54, 76, 98, 34, 62, 88, 46, 72];

        let score = 0, streak = 0, progress = 0, level = 0, qNum = 0;
        let currentNum, currentH, currentT, currentU, correctHalf, attempts = 0;
        let stickers = JSON.parse(sessionStorage.getItem('stickers_halving') || '[]');

        function saveStickers() {
            sessionStorage.setItem('stickers_halving', JSON.stringify(stickers));
            updateStickerHeader();
        }

        const CORRECT_MSGS = ["🎉 PERFECT! You halved it!", "🔥 Incredible maths brain!", "✂️ Sliced it perfectly!", "⚽ GOAL! That was genius!", "💯 Absolutely correct!", "🌟 You're a Halving Hero!"];
        const WRONG_MSGS = ["Not quite — use the decompose trick! 🧠", "Check each part — hundreds, tens, units! 💪", "So close! Try again! 🔄", "Remember: split it up first, then halve each bit! ✂️"];

        function generateNumber() {
            if (Math.random() < 0.3) return EVEN_2_DIGIT[Math.floor(Math.random() * EVEN_2_DIGIT.length)];
            let candidates = EVEN_3_DIGIT.filter(n => n >= 200 && n <= 800);
            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function decompose(n) {
            const h = Math.floor(n / 100) * 100, t = Math.floor((n % 100) / 10) * 10, u = n % 10;
            return { h, t, u };
        }

        function newQuestion() {
            attempts = 0; currentNum = generateNumber();
            const d = decompose(currentNum);
            currentH = d.h; currentT = d.t; currentU = d.u;
            correctHalf = currentNum / 2;
            qNum++;
            document.getElementById('q-badge').textContent = `Question ${qNum}`;
            document.getElementById('big-number').textContent = currentNum;
            document.getElementById('tree-top').textContent = currentNum;
            document.getElementById('final-num').textContent = currentNum;

            const htuRow = document.getElementById('htu-row'), halfRow = document.getElementById('half-row');
            htuRow.innerHTML = ''; halfRow.innerHTML = '';
            const parts = [];
            if (currentH > 0) parts.push({ label: 'Hundreds', cls: 'h', val: currentH });
            if (currentT > 0) parts.push({ label: 'Tens', cls: 't', val: currentT });
            if (currentU > 0) parts.push({ label: 'Units', cls: 'u', val: currentU });
            if (parts.length === 0) parts.push({ label: 'Units', cls: 'u', val: currentNum });

            parts.forEach((p, idx) => {
                const htuBlock = document.createElement('div');
                htuBlock.className = 'htu-block';
                htuBlock.innerHTML = `<div class="htu-label ${p.cls}">${p.label}</div><div class="htu-value ${p.cls}">${p.val}</div>`;
                htuRow.appendChild(htuBlock);

                const halfBlock = document.createElement('div');
                halfBlock.className = 'half-block';
                halfBlock.innerHTML = `<div class="half-label">½ of ${p.val}</div><input type="number" class="half-input" id="half-input-${idx}" data-correct="${p.val / 2}" placeholder="?" />`;
                halfRow.appendChild(halfBlock);
            });

            document.querySelectorAll('.half-input').forEach((inp, i, all) => {
                inp.addEventListener('keydown', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (i + 1 < all.length) all[i + 1].focus();
                        else document.getElementById('final-input').focus();
                    }
                });
            });

            const fi = document.getElementById('final-input');
            fi.value = ''; fi.className = 'final-input';
            document.getElementById('check-btn').style.display = '';
            document.getElementById('feedback').style.display = 'none';
            setTimeout(() => { const first = document.querySelector('.half-input'); if (first) first.focus(); }, 100);
        }

        function updateProgressUI() {
            const theme = THEMES[level % THEMES.length];
            document.getElementById('progress-text').textContent = `Collecting: ${theme.name} ${theme.emoji}`;
            document.getElementById('progress-count').textContent = `${progress} / 5`;
            document.getElementById('progress-fill').style.width = `${(progress / 5) * 100}%`;
        }

        function checkAnswer() {
            document.querySelectorAll('.half-input').forEach(inp => {
                const val = parseInt(inp.value);
                const correct = parseInt(inp.dataset.correct);
                inp.className = val === correct ? 'half-input correct' : 'half-input wrong';
            });

            const fi = document.getElementById('final-input');
            const val = parseInt(fi.value);
            if (isNaN(val)) { fi.focus(); return; }

            if (val === correctHalf) {
                score += attempts === 0 ? 100 : 50; streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                fi.className = 'final-input correct';
                progress++; updateProgressUI();
                const s = pickSticker(); stickers.push(s); saveStickers(); showStickerFlash(s);
                const sp = document.createElement('span'); sp.textContent = s;
                document.getElementById('sticker-row').appendChild(sp);
                document.getElementById('sticker-book').classList.add('visible');

                if (progress >= 5) {
                    setTimeout(() => {
                        progress = 0; const oldLevel = level; level++;
                        const celTheme = THEMES[oldLevel % THEMES.length];
                        document.getElementById('cel-emoji').textContent = celTheme.emoji;
                        document.getElementById('cel-sub').textContent = `You collected all ${celTheme.name} stickers!`;
                        document.getElementById('cel-sticker').textContent = celTheme.stickers[Math.floor(Math.random() * celTheme.stickers.length)];
                        updateProgressUI();
                        document.getElementById('game-area').style.display = 'none';
                        document.getElementById('celebration').classList.add('show');
                    }, 800);
                } else {
                    document.getElementById('feedback').className = 'feedback correct-fb';
                    document.getElementById('feedback-emoji').textContent = s;
                    document.getElementById('feedback-msg').textContent = CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)];
                    document.getElementById('feedback').style.display = 'block';
                    document.getElementById('check-btn').style.display = 'none';
                }
            } else {
                attempts++; streak = 0;
                document.getElementById('streak').textContent = streak;
                fi.className = 'final-input wrong';
                document.getElementById('feedback').className = 'feedback wrong-fb';
                document.getElementById('feedback-emoji').textContent = '🤔';
                document.getElementById('feedback-msg').textContent = WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)];
                document.getElementById('feedback').style.display = 'block';
                fi.value = ''; fi.focus();
            }
        }

        function nextQuestion() { newQuestion(); }
        function afterCelebration() {
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('game-area').style.display = 'block';
            newQuestion();
        }

        document.getElementById('final-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAnswer();
        });

        (function restoreStickers() {
            if (stickers.length > 0) {
                const row = document.getElementById('sticker-row');
                stickers.forEach(s => { const sp = document.createElement('span'); sp.textContent = s; row.appendChild(sp); });
                document.getElementById('sticker-book').classList.add('visible');
            }
            updateStickerHeader();
        })();
        updateProgressUI();
        newQuestion();
    </script>
</body>

</html>
