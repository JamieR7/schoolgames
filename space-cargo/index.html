<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cargo 🚀 | School Games</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,800;0,900;1,400;1,800;1,900&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --space-bg: #020617;
            --neon-blue: #22d3ee;
            --neon-orange: #f97316;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--space-bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 300px 300px;
            animation: stars-drift 120s linear infinite;
        }

        @keyframes stars-drift {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 1000px 1000px;
            }
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .space-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        /* 3D Crate Styling */
        .premium-crate {
            width: 36px;
            height: 36px;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .crate-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 4px;
            backface-visibility: hidden;
        }

        .front {
            background: var(--crate-color);
            transform: translateZ(10px);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2), 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .top {
            background: var(--crate-light);
            height: 20px;
            top: -10px;
            transform: rotateX(90deg) translateZ(10px);
        }

        .right {
            background: var(--crate-dark);
            width: 20px;
            right: -10px;
            transform: rotateY(90deg) translateZ(10px);
        }

        .premium-crate.hover {
            transform: translateY(-8px) scale(1.15) rotateY(10deg);
            filter: brightness(1.2);
            z-index: 100;
        }

        .space-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .space-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .space-btn:active {
            transform: translateY(2px);
        }

        @keyframes thruster-flicker {

            0%,
            100% {
                opacity: 0.7;
                transform: scaleX(1);
            }

            50% {
                opacity: 1;
                transform: scaleX(1.4);
            }
        }

        .thruster-fire {
            animation: thruster-flicker 0.08s infinite;
            transform-origin: left center;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }
        }

        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes sticker-pop {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.3) rotate(10deg);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            animation: sticker-pop 1.8s ease-out forwards;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            padding: 0.8rem 1.5rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: black;
            transform: translateX(-5px);
        }
    </style>
</head>

<body class="antialiased">
    <a href="../index.html" class="back-btn">← Back to Hangar</a>
    <div id="root"></div>

    <script type="text/babel" src="game.js"></script>
</body>

</html>
