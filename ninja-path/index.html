<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie's Ninja Path 🥷</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX support in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dojo: {
                            bg: '#1a1c1e',
                            card: '#2d333b',
                            accent: '#ef4444',
                            gold: '#fbbf24',
                            border: '#374151',
                            green: '#059669'
                        }
                    },
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #1a1c1e;
            background-image: radial-gradient(#2d333b 2px, transparent 2px);
            background-size: 40px 40px;
            min-height: 100vh;
        }

        .ninja-card {
            background: #2d333b;
            border: 4px solid #374151;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .command-btn {
            transition: all 0.1s;
            box-shadow: 0 4px 0 #1f2937;
        }

        .command-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1f2937;
        }

        .grid-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 1px solid #374151;
            background: rgba(255, 255, 255, 0.03);
        }

        .grid-cell.entry {
            background: rgba(5, 150, 105, 0.2);
        }

        .grid-cell.exit {
            background: rgba(239, 68, 68, 0.2);
        }

        #sticker-flash-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            display: none;
        }

        @keyframes sticker-pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            display: block !important;
            animation: sticker-pop 1.5s ease-out forwards;
        }

        .rare-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .rare-banner.show {
            display: flex;
        }

        .rare-inner {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: 8px solid white;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.6);
        }
    </style>
</head>

<body class="p-4 md:p-8 flex flex-col items-center">
    <a href="../index.html" class="self-start mb-6 text-gray-400 hover:text-white font-bold flex items-center gap-2">
        <span>←</span> Back to All Games
    </a>

    <div id="root" class="w-full max-w-4xl flex flex-col items-center"></div>

    <!-- The game logic will be in game.js -->
    <script type="text/babel" src="game.js"></script>
    <script type="text/babel">
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
