<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angus's Dino Maths Adventure 🦖🧭</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX support in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fefce8;
            background-image: radial-gradient(#fef08a 2px, transparent 2px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 4rem;
            color: #1f2937;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid #fef08a;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #854d0e;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #fefce8;
            border-radius: 9999px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #713f12;
            border: 2px solid #fef08a;
        }

        .header-stickers {
            display: flex;
            gap: 0.3rem;
            font-size: 1.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #854d0e;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .back-btn:hover {
            color: #a16207;
        }

        /* Progress */
        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.9rem;
            color: #854d0e;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .progress-bar {
            background: white;
            border: 4px solid #fef08a;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #facc15, #fde047);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        /* Stickers */
        .stickers {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 4px solid #fefce8;
            display: none;
        }

        .stickers.visible {
            display: block;
        }

        .stickers-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #a16207;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sticker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 2rem;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            outline: 4px solid #fef08a;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: #854d0e;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.9rem;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        /* Column Addition/Subtraction Style */
        .column-math {
            font-size: 3.5rem;
            font-weight: 900;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            margin: 2rem 0;
            position: relative;
        }

        .math-row {
            display: flex;
            gap: 1rem;
            position: relative;
        }

        .math-row span {
            width: 4.5rem;
            height: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .op-sign {
            position: absolute;
            left: -5.5rem;
            color: #9ca3af;
            width: 4.5rem;
            height: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .math-line {
            height: 6px;
            background: #1f2937;
            width: 100%;
            border-radius: 3px;
            margin-bottom: 0.5rem;
        }

        .carry-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .carry-box {
            width: 4.5rem;
            height: 4.5rem;
            border: 3px dashed #f59e0b;
            border-radius: 0.8rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d97706;
            cursor: pointer;
            background: white;
        }

        .carry-box.active {
            background: #fef3c7;
            border-style: solid;
            font-weight: 900;
        }

        /* Inputs */
        .answer-row {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .column-input {
            width: 4.5rem;
            height: 5.5rem;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            border: 4px solid #fef08a;
            border-radius: 1.2rem;
            color: #854d0e;
            outline: none;
            transition: all 0.2s;
            background: #fffbeb;
            padding: 0;
        }

        .column-input:focus {
            border-color: #854d0e;
            background: white;
        }

        .column-input::-webkit-inner-spin-button,
        .column-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Problem Text */
        .problem-bubble {
            background: #fffbeb;
            border: 4px solid #fef08a;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #713f12;
            position: relative;
            text-align: left;
        }

        .problem-bubble:after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 40px;
            border-width: 20px 20px 0 0;
            border-style: solid;
            border-color: #fef08a transparent;
        }

        .check-btn {
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: 900;
            background: #854d0e;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 1rem 3rem;
            box-shadow: 0 6px 0 #451a03;
            text-transform: uppercase;
            margin-top: 1.5rem;
            transition: all 0.1s;
        }

        .check-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #451a03;
        }

        /* Feedback */
        .feedback-area {
            margin-top: 1.5rem;
        }

        .feedback {
            border-radius: 1.5rem;
            padding: 1.2rem;
            text-align: center;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #f0fdf4;
            border: 3px solid #86efac;
            color: #16a34a;
        }

        .feedback.wrong {
            background: #fef2f2;
            border: 3px solid #fca5a5;
            color: #dc2626;
        }

        /* Celebration & Rare */
        #sticker-flash-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            display: none;
        }

        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 4000;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(133, 77, 14, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .celebration.show {
            display: flex;
        }

        .rare-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .rare-banner.show {
            display: flex;
        }

        .rare-inner {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: 8px solid white;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.6);
        }

        .select-btn {
            font-family: inherit;
            font-size: 1.8rem;
            font-weight: 900;
            background: white;
            color: #854d0e;
            border: 6px solid #fef08a;
            border-radius: 2rem;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .select-btn:hover {
            background: #fefce8;
            transform: translateY(-5px);
            box-shadow: 0 10px 0 #fef08a;
        }

        @keyframes sticker-pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            display: block !important;
            animation: sticker-pop 1.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-btn">← Back to All Games</a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const THEMES = [
            { name: 'Real Madrid', emoji: '🏆', stickers: ['⚽', '🏟️', '🥅', '👟', '🏆', '🧤', '🥇', '📣', '🎽', '🧣', '🎖️', '🔵', '⬜', '🌟', '🎯'] },
            { name: 'Beyblade', emoji: '🌪️', stickers: ['🌪️', '💥', '🌀', '⚙️', '🔧', '🔥', '⚡', '💫', '🛸', '🎯', '💿', '🔩', '🎪', '🎰', '🌀'] },
            { name: 'Bruno', emoji: '🐶', stickers: ['🐶', '🦴', '🎾', '🐾', '🐕', '🥩', '🦮', '🥎', '🚿', '🐕‍🦺', '🌿', '🏡', '🎀'] },
            { name: 'Judo Master', emoji: '🥋', stickers: ['🥋', '💪', '🥇', '🤸', '⛩️', '🇯🇵', '🧘', '🏆', '💯', '🎖️', '🏯', '🌸', '🥁'] },
            { name: 'Agent P', emoji: '🦆', stickers: ['🦆', '🎩', '🎸', '🛠️', '🧪', '🎢', '📻', '🗺️', '⚙️', '🔩', '🔬', '🧲', '📡', '🎬', '🛩️'] },
            { name: 'Space', emoji: '🚀', stickers: ['🚀', '🌍', '🌙', '⭐', '🛸', '☄️', '🪐', '👨‍🚀', '🌠', '🔭', '🛰️', '💫', '🌌', '🌟'] },
        ];
        const RARE_STICKERS = [
            { emoji: '💎', name: 'Diamond' }, { emoji: '👑', name: 'Crown' },
            { emoji: '🐉', name: 'Dragon' }, { emoji: '🌈', name: 'Rainbow' }, { emoji: '🔮', name: 'Crystal Ball' },
            { emoji: '🍀', name: 'Lucky Clover' }, { emoji: '🦅', name: 'Eagle' }, { emoji: '🎆', name: 'Fireworks' },
            { emoji: '⚡', name: 'Lightning Bolt' }, { emoji: '🌙', name: 'Golden Moon' }, { emoji: '🎭', name: 'Magic Mask' },
            { emoji: '🐋', name: 'Blue Whale' }, { emoji: '🌋', name: 'Volcano' },
        ];
        const DINO_CHARS = ["Tyrannosaurus Rex", "Triceratops", "Stegosaurus", "Velociraptor", "Brachiosaurus", "Diplodocus", "Spinosaurus", "Ankylosaurus"];
        const RARE_CHANCE = 0.2;

        function App() {
            const [mode, setMode] = useState('select'); // select, play, reward
            const [operation, setOperation] = useState('add');
            const [num1, setNum1] = useState(0);
            const [num2, setNum2] = useState(0);
            const [answer, setAnswer] = useState({ h: '', t: '', u: '' });
            const [carries, setCarries] = useState({ h: '', t: '' });
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [progress, setProgress] = useState(0);
            const [level, setLevel] = useState(0);
            const [status, setStatus] = useState('playing');
            const [collection, setCollection] = useState(() => JSON.parse(sessionStorage.getItem('stickers_dinosaurs') || '[]'));
            const [nextSticker, setNextSticker] = useState('');
            const [problemText, setProblemText] = useState('');
            const [isRarePending, setIsRarePending] = useState(false);
            const [rareInfo, setRareInfo] = useState(null);
            const [showRare, setShowRare] = useState(false);
            const [flashEmoji, setFlashEmoji] = useState(null);

            const hRef = useRef(null); const tRef = useRef(null); const uRef = useRef(null);

            useEffect(() => {
                sessionStorage.setItem('stickers_dinosaurs', JSON.stringify(collection));
            }, [collection]);

            const generateProblem = (op = operation) => {
                let n1, n2;
                const d1 = DINO_CHARS[Math.floor(Math.random() * DINO_CHARS.length)];
                const d2 = DINO_CHARS[Math.floor(Math.random() * DINO_CHARS.length)];
                if (op === 'add') {
                    n1 = Math.floor(Math.random() * 800) + 100; n2 = Math.floor(Math.random() * (999 - n1)) + 1;
                    setProblemText(`Angus spotted ${n1} ${d1}s and then ${n2} ${d2}s. How many altogether?`);
                } else {
                    n1 = Math.floor(Math.random() * 899) + 100; n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
                    setProblemText(`Angus saw ${n1} ${d1}s, but ${n2} of them ran away! How many left?`);
                }
                setNum1(n1); setNum2(n2); setAnswer({ h: '', t: '', u: '' }); setCarries({ h: '', t: '' }); setStatus('playing');

                const theme = THEMES[level % THEMES.length];
                if (Math.random() < RARE_CHANCE) {
                    const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
                    const available = RARE_STICKERS.filter(s => !rareOwned.includes(s.emoji));
                    const pool = available.length > 0 ? available : RARE_STICKERS;
                    const r = pool[Math.floor(Math.random() * pool.length)];
                    setNextSticker(r.emoji); setRareInfo(r); setIsRarePending(true);
                } else {
                    setNextSticker(theme.stickers[Math.floor(Math.random() * theme.stickers.length)]);
                    setIsRarePending(false);
                }
                setTimeout(() => uRef.current?.focus(), 100);
            };

            const startPlaying = (op) => { setOperation(op); setMode('play'); generateProblem(op); };

            const checkAnswer = () => {
                const userVal = parseInt(`${answer.h || 0}${answer.t || 0}${answer.u || 0}`);
                const correctVal = operation === 'add' ? num1 + num2 : num1 - num2;
                if (userVal === correctVal) {
                    setScore(s => s + 100); setStreak(s => s + 1);
                    setCollection(p => [...p, nextSticker]);
                    showStickerFlash(nextSticker);
                    if (isRarePending && rareInfo) {
                        const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
                        if (!rareOwned.includes(rareInfo.emoji)) {
                            rareOwned.push(rareInfo.emoji); sessionStorage.setItem('stickers_rare', JSON.stringify(rareOwned));
                        }
                        setTimeout(() => { setShowRare(true); playRareFanfare(); }, 500);
                    }
                    const nextProgress = progress + 1;
                    if (nextProgress >= 5) {
                        setTimeout(() => setStatus('reward'), 800);
                    } else {
                        setProgress(nextProgress); setStatus('correct');
                    }
                } else {
                    setStatus('incorrect'); setStreak(0);
                }
            };

            const showStickerFlash = (emoji) => {
                setFlashEmoji(emoji); setTimeout(() => setFlashEmoji(null), 1500);
            };

            const playRareFanfare = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const now = ctx.currentTime;
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.2, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
                    });
                } catch (e) { }
            };

            const nextLevel = () => { setLevel(l => l + 1); setProgress(0); setStatus('playing'); generateProblem(); };
            const nextQuestion = () => { generateProblem(); };

            const currentTheme = THEMES[level % THEMES.length];
            const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
            const n1s = String(num1).padStart(3, '0'), n2s = String(num2).padStart(3, '0');

            if (mode === 'select') {
                return (
                    <div className="card" style={{ marginTop: '5rem' }}>
                        <div style={{ fontSize: '8rem', marginBottom: '2rem' }}>🦕🧭</div>
                        <h2 style={{ fontSize: '2.5rem', fontWeight: 900, color: '#854d0e', marginBottom: '1.5rem' }}>DINO ADVENTURE</h2>
                        <p style={{ fontSize: '1.2rem', fontWeight: 700, color: '#a16207', marginBottom: '3rem' }}>Help Angus track down the rarest dinosaurs!</p>
                        <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center' }}>
                            <button className="select-btn" onClick={() => startPlaying('add')}>🦴 ADD</button>
                            <button className="select-btn" onClick={() => startPlaying('subtract')}>🦖 SUB</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ width: '100%', maxWidth: '800px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <header>
                        <h1>Dino Adventure 🦕</h1>
                        <div className="stats">
                            <div className="header-stickers">
                                {[...collection.slice(-3), ...rareOwned.slice(-2)].slice(-5).map((s, i) => <span key={i}>{s}</span>)}
                            </div>
                            <div className="stat-pill">⭐ {score}</div>
                            <div className="stat-pill">🔥 {streak}</div>
                        </div>
                    </header>

                    <div className="progress-wrap">
                        <div className="progress-label">
                            <span>Collecting: {currentTheme.name} {currentTheme.emoji}</span>
                            <span>{progress} / 5</span>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${(progress / 5) * 100}%` }}></div>
                        </div>
                    </div>

                    {collection.length > 0 && (
                        <div className="stickers visible">
                            <div className="stickers-label">Knowledge Collection:</div>
                            <div className="sticker-row">
                                {collection.map((s, i) => <span key={i}>{s}</span>)}
                                {rareOwned.map((s, i) => <span key={'r' + i}>{s}</span>)}
                            </div>
                        </div>
                    )}

                    <div className="card">
                        {status === 'reward' ? (
                            <div className="celebration show" style={{ position: 'static', background: 'none', color: 'inherit', backdropFilter: 'none', padding: 0 }}>
                                <div className="celebration-emoji">{currentTheme.emoji}</div>
                                <h2 style={{ fontSize: '2.5rem', fontWeight: 900, color: '#854d0e' }}>Amazing Explorer! 🎉</h2>
                                <p style={{ fontSize: '1.2rem', fontWeight: 700 }}>You found all the {currentTheme.name} stickers!</p>
                                <div className="sticker-reward">{currentTheme.stickers[0]}</div>
                                <button className="check-btn" onClick={nextLevel}>Next Mission! 🚀</button>
                            </div>
                        ) : (
                            <div>
                                <div className="badge">{operation.toUpperCase()} Challenge</div>
                                <div className="problem-bubble">{problemText}</div>

                                <div className="badge" style={{ background: isRarePending ? '#fbbf24' : '#854d0e', marginBottom: '2rem' }}>
                                    {isRarePending ? '⭐ RARE FIND AHEAD!' : `Sticker: ${nextSticker}`}
                                </div>

                                <div style={{ display: 'flex', justifyContent: 'center', width: '100%' }}>
                                    <div className="column-math">
                                        <div className="carry-row">
                                            <div className={`carry-box ${carries.h ? 'active' : ''}`} onClick={() => setCarries(p => ({ ...p, h: p.h ? '' : '1' }))}>{carries.h || '\u00A0'}</div>
                                            <div className={`carry-box ${carries.t ? 'active' : ''}`} onClick={() => setCarries(p => ({ ...p, t: p.t ? '' : '1' }))}>{carries.t || '\u00A0'}</div>
                                            <div className="carry-box" style={{ visibility: 'hidden' }}></div>
                                        </div>
                                        <div className="math-row">
                                            <span>{n1s[0] === '0' ? '\u00A0' : n1s[0]}</span>
                                            <span>{(n1s[0] === '0' && n1s[1] === '0') ? '\u00A0' : n1s[1]}</span>
                                            <span>{n1s[2]}</span>
                                        </div>
                                        <div className="math-row">
                                            <span className="op-sign">{operation === 'add' ? '+' : '-'}</span>
                                            <span>{n2s[0] === '0' ? '\u00A0' : n2s[0]}</span>
                                            <span>{(n2s[0] === '0' && n2s[1] === '0') ? '\u00A0' : n2s[1]}</span>
                                            <span>{n2s[2]}</span>
                                        </div>
                                        <div className="math-line"></div>
                                        <div className="answer-row">
                                            <input ref={hRef} type="number" className="column-input" value={answer.h} onChange={e => { const v = e.target.value.slice(-1); setAnswer(p => ({ ...p, h: v })); }} onKeyDown={e => e.key === 'Enter' && checkAnswer()} />
                                            <input ref={tRef} type="number" className="column-input" value={answer.t} onChange={e => { const v = e.target.value.slice(-1); setAnswer(p => ({ ...p, t: v })); if (v && !answer.h) hRef.current?.focus(); }} onKeyDown={e => e.key === 'Enter' && checkAnswer()} />
                                            <input ref={uRef} type="number" className="column-input" value={answer.u} onChange={e => { const v = e.target.value.slice(-1); setAnswer(p => ({ ...p, u: v })); if (v && !answer.t) tRef.current?.focus(); }} onKeyDown={e => e.key === 'Enter' && checkAnswer()} />
                                        </div>
                                    </div>
                                </div>

                                <div className="feedback-area">
                                    {status === 'correct' && (
                                        <div className="feedback show correct">
                                            <div className="feedback-emoji">{nextSticker}</div>
                                            <div className="feedback-msg">Brilliant calculation! 🦖</div>
                                            <button className="next-btn" onClick={nextQuestion}>Next Adventure →</button>
                                        </div>
                                    )}
                                    {status === 'incorrect' && (
                                        <div className="feedback show wrong">
                                            <div className="feedback-emoji">🤔</div>
                                            <div className="feedback-msg">Help Angus check the columns again!</div>
                                        </div>
                                    )}
                                </div>

                                {status === 'playing' && <button className="check-btn" onClick={checkAnswer}>Report Total 📜</button>}
                            </div>
                        )}
                    </div>

                    {showRare && rareInfo && (
                        <div className="rare-banner show">
                            <div className="rare-inner">
                                <span style={{ fontSize: '7rem', display: 'block' }}>{rareInfo.emoji}</span>
                                <h2 style={{ fontSize: '2rem', fontWeight: 900, margin: '1rem 0' }}>RARE FIND!</h2>
                                <p style={{ fontSize: '1.5rem', fontWeight: 800, opacity: 0.9 }}>{rareInfo.name}</p>
                                <button className="check-btn" onClick={() => setShowRare(false)} style={{ background: '#92400e' }}>Amazing! 🎉</button>
                            </div>
                        </div>
                    )}

                    {flashEmoji && (
                        <div id="sticker-flash-overlay" className="animate-sticker-pop">
                            {flashEmoji}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
