<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Mission рЯЪА</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fff7ed;
            background-image: radial-gradient(#fed7aa 2px, transparent 2px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 4rem;
            color: #1f2937;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid #fdba74;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #ea580c;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 1rem;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #fff7ed;
            border-radius: 9999px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #c2410c;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #9a3412;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .back-btn:hover {
            color: #ea580c;
        }

        /* Progress */
        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.9rem;
            color: #c2410c;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            background: white;
            border: 4px solid #fed7aa;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f97316, #fb923c);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        /* Sticker book */
        .stickers {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 4px solid #e0e7ff;
            display: none;
        }

        .stickers.visible {
            display: block;
        }

        .stickers-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .sticker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 2rem;
        }

        /* Main card */
        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            outline: 4px solid #fed7aa;
        }

        /* Problem area */
        .problem-number {
            display: inline-block;
            background: #ea580c;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .problem-text {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            color: #1f2937;
        }

        .problem-text .highlight {
            color: #ea580c;
            background: #fff7ed;
            border-radius: 0.5rem;
            padding: 0.1rem 0.4rem;
        }

        /* Bar diagram */
        .bar-area {
            background: #f0fdf4;
            border: 3px solid #bbf7d0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .bar-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #16a34a;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.7rem;
        }

        .bars {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .bar-block {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            font-weight: 900;
            font-size: 1.1rem;
            transition: all 0.3s;
            min-width: 3rem;
            height: 3rem;
            padding: 0 0.5rem;
        }

        .bar-equation {
            margin-top: 0.8rem;
            font-size: 1.1rem;
            font-weight: 800;
            color: #374151;
        }

        .bar-equation span {
            color: #ea580c;
        }

        /* Answer */
        .answer-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .answer-label {
            font-size: 1.1rem;
            font-weight: 800;
            color: #374151;
        }

        .answer-input {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            width: 8rem;
            text-align: center;
            border: 6px solid #fdba74;
            border-radius: 1.2rem;
            padding: 0.3rem;
            color: #ea580c;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        .answer-input::-webkit-inner-spin-button,
        .answer-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .answer-input:focus {
            border-color: #ea580c;
            box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15);
        }

        .answer-input.correct {
            border-color: #16a34a;
            color: #16a34a;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15);
        }

        .answer-input.wrong {
            border-color: #dc2626;
            color: #dc2626;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        /* Buttons */
        .check-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(180deg, #f97316, #ea580c);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 0.9rem 2.5rem;
            box-shadow: 0 6px 0 #9a3412;
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #9a3412;
        }

        .check-btn:hover {
            background: linear-gradient(180deg, #fb923c, #f97316);
        }

        /* Feedback panel */
        .feedback {
            display: none;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border: 3px solid #86efac;
            display: block;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border: 3px solid #fca5a5;
            display: block;
        }

        .feedback-emoji {
            font-size: 3rem;
            text-align: center;
            display: block;
            margin-bottom: 0.5rem;
        }

        .feedback-msg {
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1rem;
        }

        .feedback-msg.correct-text {
            color: #16a34a;
        }

        .feedback-msg.wrong-text {
            color: #dc2626;
        }

        .next-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            background: #16a34a;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 0.7rem 2rem;
            box-shadow: 0 4px 0 #14532d;
            display: block;
            margin: 0 auto;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .next-btn:active {
            transform: translateY(2px);
        }

        /* Celebration overlay */
        .celebration {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1rem;
        }

        .celebration.show {
            display: flex;
        }

        .celebration-emoji {
            font-size: 6rem;
            margin-bottom: 1rem;
            animation: spin 1s ease;
        }

        .celebration-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ea580c;
            margin-bottom: 0.5rem;
        }

        .celebration-sub {
            font-size: 1.2rem;
            font-weight: 700;
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .sticker-reward {
            font-size: 5rem;
            animation: bounceIn 0.5s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        .sticker-label {
            font-size: 0.9rem;
            font-weight: 800;
            color: #ea580c;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1.5rem;
        }

        /* Animations */
        @keyframes bounceIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            70% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(-15deg) scale(0.5);
            }

            70% {
                transform: rotate(10deg) scale(1.1);
            }

            100% {
                transform: rotate(0deg) scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.2rem;
            }

            .problem-text {
                font-size: 1.2rem;
            }

            .answer-input {
                font-size: 2rem;
                width: 6rem;
            }

            .check-btn {
                font-size: 1.1rem;
                padding: 0.7rem 2rem;
            }
        }
    </style>
</head>

<body>

    <a href="../index.html" class="back-btn">вЖР Back to All Games</a>

    <header>
        <h1>вЬЦпЄП Multiplication Mission</h1>
        <div class="stats">
            <div class="stat-pill">в≠Р <span id="score">0</span></div>
            <div class="stat-pill">рЯФ• <span id="streak">0</span></div>
        </div>
    </header>

    <div class="progress-wrap">
        <div class="progress-label">
            <span id="progress-text">Level 1 вАФ real Madrid theme</span>
            <span id="progress-count">0 / 5</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
    </div>

    <div class="stickers" id="sticker-book">
        <div class="stickers-label">Archie's Sticker Collection</div>
        <div class="sticker-row" id="sticker-row"></div>
    </div>

    <div class="card" id="main-card">
        <!-- Game question -->
        <div id="game-area">
            <div class="problem-number" id="q-number">Question 1</div>
            <p class="problem-text" id="problem-text">Loading...</p>
            <div class="bar-area" id="bar-area">
                <div class="bar-label">рЯУК Draw it out вАФ the bar diagram</div>
                <div class="bars" id="bars"></div>
                <div class="bar-equation" id="bar-equation">... √Ч ... = ?</div>
            </div>
            <div class="answer-area">
                <span class="answer-label">My answer:</span>
                <input type="number" class="answer-input" id="answer-input" placeholder="?" min="0" max="9999" />
                <button class="check-btn" id="check-btn" onclick="checkAnswer()">Check! вЬ®</button>
            </div>

            <div class="feedback" id="feedback">
                <span class="feedback-emoji" id="feedback-emoji">рЯОЙ</span>
                <p class="feedback-msg" id="feedback-msg">Amazing!</p>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question вЖТ</button>
            </div>
        </div>

        <!-- Level up celebration (hidden by default) -->
        <div class="celebration" id="celebration">
            <div class="celebration-emoji" id="cel-emoji">рЯПЖ</div>
            <div class="celebration-title">Level Up! рЯОЙ</div>
            <div class="celebration-sub" id="cel-sub">New theme unlocked!</div>
            <div class="sticker-reward" id="cel-sticker">в≠Р</div>
            <div class="sticker-label">NEW STICKER UNLOCKED!</div>
            <button class="check-btn" onclick="afterCelebration()" style="margin-top:1rem;">Keep Going! рЯЪА</button>
        </div>
    </div>

    <script>
        const THEMES = [
            { name: 'Real Madrid', emoji: 'рЯПЖ', color: '#3b82f6', bg: '#eff6ff', stickers: ['вЪљ', 'рЯПЯпЄП', 'рЯ•Е', 'рЯСЯ', 'рЯПЖ', 'рЯІ§', 'рЯ•З', 'рЯУ£', 'рЯОљ', 'рЯІ£'] },
            { name: 'Beyblade', emoji: 'рЯМ™пЄП', color: '#f97316', bg: '#fff7ed', stickers: ['рЯМ™пЄП', 'рЯТ•', 'рЯМА', 'вЪЩпЄП', 'рЯФІ', 'рЯФ•', 'вЪ°', 'рЯТЂ', 'рЯЫЄ', 'рЯОѓ'] },
            { name: 'Bruno the Dog', emoji: 'рЯРґ', color: '#d97706', bg: '#fffbeb', stickers: ['рЯРґ', 'рЯ¶і', 'рЯОЊ', 'рЯРЊ', 'рЯРХ', 'рЯ•©', 'рЯ¶Ѓ', 'рЯ•О', 'рЯЫЛпЄП', 'рЯЪњ'] },
            { name: 'Judo Master', emoji: 'рЯ•Л', color: '#dc2626', bg: '#fef2f2', stickers: ['рЯ•Л', 'рЯТ™', 'рЯ•З', 'рЯ§Є', 'вЫ©пЄП', 'рЯЗѓрЯЗµ', 'рЯІШ', 'рЯПЖ', 'рЯТѓ', 'рЯОЦпЄП'] },
            { name: 'Agent P', emoji: 'рЯ¶Ж', color: '#0d9488', bg: '#f0fdfa', stickers: ['рЯ¶Ж', 'рЯО©', 'рЯОЄ', 'рЯЫ†пЄП', 'рЯІ™', 'рЯОҐ', 'рЯУї', 'рЯЧЇпЄП', 'вЪЩпЄП', 'рЯФ©'] },
        ];

        const PROBLEMS = [
            (a, b) => ({ text: `Ruby made <span class="highlight">${a} necklaces</span> with <span class="highlight">${b} beads</span> each. How many beads did she use in total?`, a, b }),
            (a, b) => ({ text: `Freesper bought <span class="highlight">${a} packs</span> of biscuits. Each pack has <span class="highlight">${b} biscuits</span>. How many biscuits altogether?`, a, b }),
            (a, b) => ({ text: `A teacher ordered <span class="highlight">${a} boxes</span> of crayons. Each box holds <span class="highlight">${b} crayons</span>. How many crayons in total?`, a, b }),
            (a, b) => ({ text: `Archie harvested <span class="highlight">${a} rows</span> of carrots with <span class="highlight">${b} carrots</span> in each row. How many carrots altogether?`, a, b }),
            (a, b) => ({ text: `There are <span class="highlight">${a} tables</span> at Archie's party. Each table seats <span class="highlight">${b} people</span>. How many people can sit down?`, a, b }),
            (a, b) => ({ text: `Bruno has <span class="highlight">${a} baskets</span>. Each basket has <span class="highlight">${b} bones</span> inside. How many bones altogether?`, a, b }),
            (a, b) => ({ text: `A player scored <span class="highlight">${b} goals</span> in every match. He played <span class="highlight">${a} matches</span>. How many goals in total?`, a, b }),
            (a, b) => ({ text: `There are <span class="highlight">${a} shelves</span> in the library, each with <span class="highlight">${b} books</span>. How many books in the library?`, a, b }),
            (a, b) => ({ text: `A baker makes <span class="highlight">${b} cakes</span> every day for <span class="highlight">${a} days</span>. How many cakes does she bake in total?`, a, b }),
            (a, b) => ({ text: `${a} buses each carry <span class="highlight">${b} passengers</span>. How many passengers in total?`, a, b }),
        ];

        const BAR_COLOURS = ['#3b82f6', '#f97316', '#10b981', '#8b5cf6', '#ec4899', '#14b8a6', '#f59e0b', '#ef4444', '#84cc16', '#0ea5e9'];

        let score = 0, streak = 0, progress = 0, level = 0;
        let currentA, currentB, correctAnswer;
        let stickers = [];
        let questionIndex = 0;
        let currentProblemIdx = 0;
        let attempts = 0;

        const CORRECT_MSGS = [
            "рЯОЙ PERFECT! You nailed it!",
            "вЪљ GOAL! That's genius maths!",
            "рЯФ• ON FIRE! Keep going!",
            "рЯЪА Superstar answer!",
            "рЯТѓ 100% correct вАФ AMAZING!",
            "рЯ•З Gold medal answer!",
            "рЯМЯ You're a Maths Champion!",
        ];
        const WRONG_MSGS = [
            "Almost! Try again вАФ you've got this! рЯТ™",
            "Not quite вАФ look at the bar diagram for a clue! рЯІ†",
            "Give it another go, Archie! You're close! рЯОѓ",
            "Hmm, check your multiplication вАФ try again! рЯФД",
        ];

        function pickNumbers() {
            // Keep numbers child-friendly: a from 2вАУ10, b from 2вАУ20 (multiples of 5/10 sometimes)
            const aChoices = [2, 3, 4, 5, 6, 7, 8, 9, 10];
            const bChoices = [2, 3, 4, 5, 6, 7, 8, 9, 10, 15, 20];
            currentA = aChoices[Math.floor(Math.random() * aChoices.length)];
            currentB = bChoices[Math.floor(Math.random() * bChoices.length)];
            correctAnswer = currentA * currentB;
        }

        function renderBars(a, b) {
            const barsEl = document.getElementById('bars');
            barsEl.innerHTML = '';
            const color = BAR_COLOURS[level % BAR_COLOURS.length];
            const countToShow = Math.min(a, 10);
            for (let i = 0; i < countToShow; i++) {
                const block = document.createElement('div');
                block.className = 'bar-block';
                block.textContent = b;
                block.style.background = color + '22';
                block.style.color = color;
                block.style.border = `3px solid ${color}`;
                barsEl.appendChild(block);
            }
            if (a > 10) {
                const ellipsis = document.createElement('div');
                ellipsis.textContent = 'вА¶';
                ellipsis.style.fontWeight = '900';
                ellipsis.style.fontSize = '1.5rem';
                barsEl.appendChild(ellipsis);
            }
            document.getElementById('bar-equation').innerHTML = `<span>${a}</span> √Ч <span>${b}</span> = <span>?</span>`;
        }

        function newQuestion() {
            attempts = 0;
            pickNumbers();
            questionIndex++;
            currentProblemIdx = Math.floor(Math.random() * PROBLEMS.length);
            const prob = PROBLEMS[currentProblemIdx](currentA, currentB);

            document.getElementById('q-number').textContent = `Question ${questionIndex}`;
            document.getElementById('problem-text').innerHTML = prob.text;
            renderBars(currentA, currentB);

            const input = document.getElementById('answer-input');
            input.value = '';
            input.className = 'answer-input';
            input.focus();

            document.getElementById('feedback').className = 'feedback';
            document.getElementById('check-btn').style.display = '';
            document.getElementById('answer-area') && (document.querySelector('.answer-area').style.opacity = '1');
        }

        function updateProgressUI() {
            const theme = THEMES[level % THEMES.length];
            document.getElementById('progress-text').textContent = `Collecting: ${theme.name} ${theme.emoji}`;
            document.getElementById('progress-count').textContent = `${progress} / 5`;
            document.getElementById('progress-fill').style.width = `${(progress / 5) * 100}%`;
        }

        function checkAnswer() {
            const input = document.getElementById('answer-input');
            const val = parseInt(input.value);
            if (isNaN(val)) { input.focus(); return; }

            const feedback = document.getElementById('feedback');
            const fbEmoji = document.getElementById('feedback-emoji');
            const fbMsg = document.getElementById('feedback-msg');
            document.getElementById('check-btn').style.display = 'none';

            if (val === correctAnswer) {
                score += attempts === 0 ? 100 : 50;
                streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                input.className = 'answer-input correct';

                progress++;
                updateProgressUI();

                // Add sticker
                const theme = THEMES[level % THEMES.length];
                const s = theme.stickers[Math.floor(Math.random() * theme.stickers.length)];
                stickers.push(s);
                const row = document.getElementById('sticker-row');
                const sp = document.createElement('span');
                sp.textContent = s;
                sp.style.animation = 'bounceIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
                row.appendChild(sp);
                document.getElementById('sticker-book').className = 'stickers visible';

                document.getElementById('bar-equation').innerHTML =
                    `<span>${currentA}</span> √Ч <span>${currentB}</span> = <span style="color:#16a34a">${correctAnswer}</span> вЬУ`;

                if (progress >= 5) {
                    // Level up!
                    progress = 0;
                    const oldLevel = level;
                    level++;
                    const celTheme = THEMES[oldLevel % THEMES.length];
                    document.getElementById('cel-emoji').textContent = celTheme.emoji;
                    document.getElementById('cel-sub').textContent = `You collected all ${celTheme.name} stickers!`;
                    const celSticker = celTheme.stickers[Math.floor(Math.random() * celTheme.stickers.length)];
                    document.getElementById('cel-sticker').textContent = celSticker;
                    updateProgressUI();
                    setTimeout(() => {
                        document.getElementById('game-area').style.display = 'none';
                        document.getElementById('celebration').className = 'celebration show';
                    }, 600);
                    return;
                }

                const msg = CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)];
                feedback.className = 'feedback correct-fb';
                fbEmoji.textContent = s;
                fbMsg.className = 'feedback-msg correct-text';
                fbMsg.textContent = msg;
            } else {
                attempts++;
                streak = 0;
                document.getElementById('streak').textContent = streak;
                input.className = 'answer-input wrong';
                const msg = WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)];
                feedback.className = 'feedback wrong-fb';
                fbEmoji.textContent = 'рЯ§Ф';
                fbMsg.className = 'feedback-msg wrong-text';
                fbMsg.textContent = msg;
                document.getElementById('check-btn').style.display = '';
                input.value = '';
                input.focus();
                return;
            }
        }

        function nextQuestion() {
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('check-btn').style.display = '';
            newQuestion();
        }

        function afterCelebration() {
            document.getElementById('celebration').className = 'celebration';
            document.getElementById('game-area').style.display = '';
            newQuestion();
        }

        // Allow Enter key
        document.getElementById('answer-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const fb = document.getElementById('feedback');
                if (fb.classList.contains('correct-fb')) nextQuestion();
                else checkAnswer();
            }
        });

        // Init
        updateProgressUI();
        newQuestion();
    </script>
</body>

</html>
