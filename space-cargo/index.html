<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie's Space Cargo 🚀</title>

    <!-- Using Montserrat for project consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,800;0,900;1,400;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons for the new tactical look -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        space: {
                            900: '#020617', // Deep space
                            800: '#0f172a', // Dark panel
                            700: '#1e293b', // Lighter panel
                        },
                        neon: {
                            pink: '#ec4899',
                            blue: '#06b6d4',
                            green: '#22c55e',
                            orange: '#f97316',
                        }
                    },
                    boxShadow: {
                        'neon-pink': '0 0 20px rgba(236, 72, 153, 0.4)',
                        'neon-blue': '0 0 20px rgba(6, 182, 212, 0.4)',
                        'neon-green': '0 0 20px rgba(34, 197, 94, 0.4)',
                        'neon-orange': '0 0 20px rgba(249, 115, 22, 0.4)',
                        'panel': '0 25px 50px -12px rgba(0, 0, 0, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(1.5px 1.5px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 100px 100px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 150px 250px, #94a3b8, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 300px 50px, #fff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: stars-drift 180s linear infinite;
        }

        @keyframes stars-drift {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 400px 400px;
            }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .animate-sticker-pop {
            animation: sticker-pop 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes sticker-pop {
            0% {
                transform: scale(0);
                opacity: 0;
                rotate: -20deg;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
                rotate: 10deg;
            }

            100% {
                transform: scale(1);
                opacity: 0;
                rotate: 0deg;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 15s linear infinite;
        }

        /* Custom thumb for slider */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ec4899;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.8);
            cursor: pointer;
            border: 3px solid white;
            margin-top: -10px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #1e293b;
            border-radius: 2px;
        }
    </style>
</head>

<body class="antialiased selection:bg-neon-pink selection:text-white">
    <div id="root"></div>

    <script type="text/babel" src="game.js"></script>
</body>

</html>
