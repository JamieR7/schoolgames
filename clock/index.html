<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie's Time Travel Adventure 🕰️🚀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX support in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0fdfa;
            background-image: radial-gradient(#99f6e4 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 4rem;
            color: #1f2937;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid #99f6e4;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #0d9488;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #f0fdfa;
            border-radius: 9999px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #0f766e;
            border: 2px solid #99f6e4;
        }

        .header-stickers {
            display: flex;
            gap: 0.3rem;
            font-size: 1.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #0d9488;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .back-btn:hover {
            color: #0f766e;
        }

        /* Progress */
        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.9rem;
            color: #0d9488;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .progress-bar {
            background: white;
            border: 4px solid #99f6e4;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #14b8a6, #5eead4);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        /* Stickers */
        .stickers {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 4px solid #f0fdfa;
            display: none;
        }

        .stickers.visible {
            display: block;
        }

        .stickers-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #0d9488;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sticker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 2rem;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            outline: 4px solid #99f6e4;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: #0d9488;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.9rem;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        /* Clock Face */
        .clock-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .clock-canvas {
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
            max-width: 100%;
            height: auto;
            border-radius: 50%;
        }

        /* Time Input */
        .time-entry {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            background: #f0fdfa;
            padding: 1.5rem;
            border-radius: 2rem;
            border: 4px solid #99f6e4;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .time-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #0d9488;
            text-transform: uppercase;
        }

        .massive-input {
            width: 5.5rem;
            height: 7rem;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            border: 4px solid #99f6e4;
            border-radius: 1.5rem;
            color: #0d9488;
            outline: none;
            transition: all 0.2s;
            background: white;
        }

        .massive-input:focus {
            border-color: #0d9488;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .massive-input::-webkit-inner-spin-button,
        .massive-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .colon {
            font-size: 4rem;
            font-weight: 900;
            color: #9ca3af;
        }

        /* Problem Text */
        .event-card {
            background: #f0fdfa;
            border: 4px solid #99f6e4;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
            text-align: left;
        }

        .event-card h3 {
            font-size: 0.9rem;
            font-weight: 900;
            color: #0d9488;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .event-card p {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.4;
        }

        /* Level Select Buttons */
        .level-grid {
            display: grid;
            gap: 1rem;
            margin-top: 2rem;
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .level-btn {
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: 900;
            background: white;
            color: #0d9488;
            border: 6px solid #99f6e4;
            border-radius: 2rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .level-btn:hover {
            background: #f0fdfa;
            transform: translateY(-5px);
            box-shadow: 0 8px 0 #99f6e4;
        }

        .check-btn {
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: 900;
            background: #0d9488;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 1rem 3.5rem;
            box-shadow: 0 6px 0 #065f46;
            text-transform: uppercase;
            margin-top: 1.5rem;
            transition: all 0.1s;
        }

        .check-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #065f46;
        }

        .next-btn {
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 900;
            background: #0d9488;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 0.8rem 2.5rem;
            box-shadow: 0 4px 0 #065f46;
            margin-top: 1.5rem;
            text-transform: uppercase;
        }

        /* Celebration & Rare */
        #sticker-flash-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            display: none;
        }

        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 4000;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 148, 136, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .celebration.show {
            display: flex;
        }

        .rare-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .rare-banner.show {
            display: flex;
        }

        .rare-inner {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: 8px solid white;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.6);
        }

        @keyframes sticker-pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            display: block !important;
            animation: sticker-pop 1.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-btn">← Back to All Games</a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const THEMES = [
            { name: 'Real Madrid', emoji: '🏆', stickers: ['⚽', '🏟️', '🥅', '👟', '🏆', '🧤', '🥇', '📣', '🎽', '🧣', '🎖️', '🔵', '⬜', '🌟', '🎯'] },
            { name: 'Beyblade', emoji: '🌪️', stickers: ['🌪️', '💥', '🌀', '⚙️', '🔧', '🔥', '⚡', '💫', '🛸', '🎯', '💿', '🔩', '🎪', '🎰', '🌀'] },
            { name: 'Bruno', emoji: '🐶', stickers: ['🐶', '🦴', '🎾', '🐾', '🐕', '🥩', '🦮', '🥎', '🚿', '🐕‍🦺', '🌿', '🏡', '🎀'] },
            { name: 'Judo Master', emoji: '🥋', stickers: ['🥋', '💪', '🥇', '🤸', '⛩️', '🇯🇵', '🧘', '🏆', '💯', '🎖️', '🏯', '🌸', '🥁'] },
            { name: 'Agent P', emoji: '🦆', stickers: ['🦆', '🎩', '🎸', '🛠️', '🧪', '🎢', '📻', '🗺️', '⚙️', '🔩', '🔬', '🧲', '📡', '🎬', '🛩️'] },
            { name: 'Space', emoji: '🚀', stickers: ['🚀', '🌍', '🌙', '⭐', '🛸', '☄️', '🪐', '👨‍🚀', '🌠', '🔭', '🛰️', '💫', '🌌', '🌟'] },
        ];
        const RARE_STICKERS = [
            { emoji: '💎', name: 'Diamond' }, { emoji: '👑', name: 'Crown' },
            { emoji: '🐉', name: 'Dragon' }, { emoji: '🌈', name: 'Rainbow' }, { emoji: '🔮', name: 'Crystal Ball' },
            { emoji: '🍀', name: 'Lucky Clover' }, { emoji: '🦅', name: 'Eagle' }, { emoji: '🎆', name: 'Fireworks' },
            { emoji: '⚡', name: 'Lightning Bolt' }, { emoji: '🌙', name: 'Golden Moon' }, { emoji: '🎭', name: 'Magic Mask' },
            { emoji: '🐋', name: 'Blue Whale' }, { emoji: '🌋', name: 'Volcano' },
        ];
        const HISTORICAL_EVENTS = [
            { year: 1969, text: "Archie lands on the Moon! Neil Armstrong is taking a step." },
            { year: 1928, text: "Archie sees Mickey Mouse in 'Steamboat Willie'!" },
            { year: 1903, text: "The Wright Brothers are flying their first airplane!" },
            { year: 1889, text: "The Eiffel Tower is opening in Paris!" },
            { year: 2012, text: "The London Olympic Games opening ceremony!" },
            { year: 1985, text: "Marty McFly's DeLorean zooms through time!" },
            { year: 1666, text: "The Great Fire of London – it's very hot!" },
            { year: 1066, text: "The Battle of Hastings – knights everywhere!" },
            { year: 1922, text: " Howard Carter opens the tomb of King Tut!" }
        ];
        const RARE_CHANCE = 0.2;

        function AnalogueClock({ hour, minute }) {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
                const radius = canvas.height / 2; ctx.save(); ctx.translate(radius, radius); const r = radius * 0.90;
                ctx.clearRect(-radius, -radius, canvas.width, canvas.height);
                // Face
                ctx.beginPath(); ctx.arc(0, 0, r, 0, 2 * Math.PI); ctx.fillStyle = 'white'; ctx.fill();
                ctx.strokeStyle = '#14b8a6'; ctx.lineWidth = r * 0.05; ctx.stroke();
                // Numbers
                ctx.font = `bold ${r * 0.18}px Montserrat`; ctx.textBaseline = "middle"; ctx.textAlign = "center"; ctx.fillStyle = "#1e293b";
                for (let n = 1; n <= 12; n++) {
                    const ang = n * Math.PI / 6; ctx.rotate(ang); ctx.translate(0, -r * 0.82); ctx.rotate(-ang);
                    ctx.fillText(n.toString(), 0, 0); ctx.rotate(ang); ctx.translate(0, r * 0.82); ctx.rotate(-ang);
                }
                // Hands
                const drawHand = (pos, length, width, color) => {
                    ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round"; ctx.strokeStyle = color;
                    ctx.moveTo(0, 0); ctx.rotate(pos); ctx.lineTo(0, -length); ctx.stroke(); ctx.rotate(-pos);
                };
                drawHand((hour % 12) * Math.PI / 6 + (minute * Math.PI / (6 * 60)), r * 0.5, r * 0.07, "#1e293b");
                drawHand(minute * Math.PI / 30, r * 0.8, r * 0.04, "#0d9488");
                // Hub
                ctx.beginPath(); ctx.arc(0, 0, r * 0.06, 0, 2 * Math.PI); ctx.fillStyle = '#0f766e'; ctx.fill();
                ctx.restore();
            }, [hour, minute]);
            return <canvas ref={canvasRef} width="350" height="350" className="clock-canvas" />;
        }

        function App() {
            const [mode, setMode] = useState('select'); // select, play, reward
            const [gameLevel, setGameLevel] = useState(1);
            const [targetTime, setTargetTime] = useState({ h: 12, m: 0 });
            const [userInput, setUserInput] = useState({ h: '', m: '' });
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [progress, setProgress] = useState(0);
            const [themeLevel, setThemeLevel] = useState(0);
            const [status, setStatus] = useState('playing');
            const [collection, setCollection] = useState(() => JSON.parse(sessionStorage.getItem('stickers_clock') || '[]'));
            const [currentEvent, setCurrentEvent] = useState(null);
            const [nextSticker, setNextSticker] = useState('');
            const [isRarePending, setIsRarePending] = useState(false);
            const [rareInfo, setRareInfo] = useState(null);
            const [showRare, setShowRare] = useState(false);
            const [flashEmoji, setFlashEmoji] = useState(null);

            const hRef = useRef(null); const mRef = useRef(null);

            useEffect(() => {
                sessionStorage.setItem('stickers_clock', JSON.stringify(collection));
            }, [collection]);

            const generateProblem = (lv = gameLevel) => {
                const event = HISTORICAL_EVENTS[Math.floor(Math.random() * HISTORICAL_EVENTS.length)];
                setCurrentEvent(event);
                let h = Math.floor(Math.random() * 12) || 12;
                let m = 0;
                if (lv === 1) m = Math.random() > 0.5 ? 0 : 30;
                else if (lv === 2) { const o = [0, 15, 30, 45]; m = o[Math.floor(Math.random() * o.length)]; }
                else m = Math.floor(Math.random() * 12) * 5;

                setTargetTime({ h, m }); setUserInput({ h: '', m: '' }); setStatus('playing');

                const theme = THEMES[themeLevel % THEMES.length];
                if (Math.random() < RARE_CHANCE) {
                    const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
                    const available = RARE_STICKERS.filter(s => !rareOwned.includes(s.emoji));
                    const pool = available.length > 0 ? available : RARE_STICKERS;
                    const r = pool[Math.floor(Math.random() * pool.length)];
                    setNextSticker(r.emoji); setRareInfo(r); setIsRarePending(true);
                } else {
                    setNextSticker(theme.stickers[Math.floor(Math.random() * theme.stickers.length)]);
                    setIsRarePending(false);
                }
                setTimeout(() => hRef.current?.focus(), 100);
            };

            const startPlaying = (lv) => { setGameLevel(lv); setMode('play'); generateProblem(lv); };

            const checkAnswer = () => {
                const h = parseInt(userInput.h); const m = parseInt(userInput.m || '0');
                if (h === targetTime.h && m === targetTime.m) {
                    setScore(s => s + 50); setStreak(s => s + 1);
                    setCollection(p => [...p, nextSticker]);
                    showStickerFlash(nextSticker);
                    if (isRarePending && rareInfo) {
                        const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
                        if (!rareOwned.includes(rareInfo.emoji)) {
                            rareOwned.push(rareInfo.emoji); sessionStorage.setItem('stickers_rare', JSON.stringify(rareOwned));
                        }
                        setTimeout(() => { setShowRare(true); playRareFanfare(); }, 500);
                    }
                    const nextProgress = progress + 1;
                    if (nextProgress >= 5) { setTimeout(() => setStatus('reward'), 800); }
                    else { setProgress(nextProgress); setStatus('correct'); }
                } else { setStatus('incorrect'); setStreak(0); }
            };

            const showStickerFlash = (emoji) => {
                setFlashEmoji(emoji); setTimeout(() => setFlashEmoji(null), 1500);
            };

            const playRareFanfare = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const now = ctx.currentTime;
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.1);
                        gain.gain.setValueAtTime(0.2, now + i * 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3);
                    });
                } catch (e) { }
            };

            const nextTheme = () => { setThemeLevel(l => l + 1); setProgress(0); setStatus('playing'); generateProblem(); };
            const nextQuestion = () => { generateProblem(); };

            const currentTheme = THEMES[themeLevel % THEMES.length];
            const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');

            if (mode === 'select') {
                return (
                    <div className="card" style={{ marginTop: '5rem' }}>
                        <div style={{ fontSize: '8rem', marginBottom: '2rem' }}>🕰️🚀</div>
                        <h2 style={{ fontSize: '2.5rem', fontWeight: 900, color: '#0d9488', marginBottom: '1.5rem' }}>TIME TRAVELER</h2>
                        <p style={{ fontSize: '1.2rem', fontWeight: 700, color: '#0f766e', marginBottom: '3rem' }}>Help Archie log his arrival times!</p>
                        <div className="level-grid">
                            <button className="level-btn" onClick={() => startPlaying(1)}>Lvl 1: Half Hours</button>
                            <button className="level-btn" onClick={() => startPlaying(2)}>Lvl 2: Quarters</button>
                            <button className="level-btn" onClick={() => startPlaying(3)}>Lvl 3: 5 Minutes</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ width: '100%', maxWidth: '800px', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <header>
                        <h1>Time Travel 🕰️</h1>
                        <div className="stats">
                            <div className="header-stickers">
                                {[...collection.slice(-3), ...rareOwned.slice(-2)].slice(-5).map((s, i) => <span key={i}>{s}</span>)}
                            </div>
                            <div className="stat-pill">⭐ {score}</div>
                            <div className="stat-pill">🔥 {streak}</div>
                        </div>
                    </header>

                    <div className="progress-wrap">
                        <div className="progress-label">
                            <span>Collecting: {currentTheme.name} {currentTheme.emoji}</span>
                            <span>{progress} / 5</span>
                        </div>
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${(progress / 5) * 100}%` }}></div>
                        </div>
                    </div>

                    {collection.length > 0 && (
                        <div className="stickers visible">
                            <div className="stickers-label">Knowledge Collection:</div>
                            <div className="sticker-row">
                                {collection.map((s, i) => <span key={i}>{s}</span>)}
                                {rareOwned.map((s, i) => <span key={'r' + i}>{s}</span>)}
                            </div>
                        </div>
                    )}

                    <div className="card">
                        {status === 'reward' ? (
                            <div className="celebration show" style={{ position: 'static', background: 'none', color: 'inherit', backdropFilter: 'none', padding: 0 }}>
                                <div className="celebration-emoji">{currentTheme.emoji}</div>
                                <h2 style={{ fontSize: '2.5rem', fontWeight: 900, color: '#0d9488' }}>Time Master! 🎉</h2>
                                <p style={{ fontSize: '1.2rem', fontWeight: 700 }}>All {currentTheme.name} stickers collected!</p>
                                <div className="sticker-reward">{currentTheme.stickers[0]}</div>
                                <button className="check-btn" onClick={nextTheme}>Continue Mission! 🚀</button>
                            </div>
                        ) : (
                            <div>
                                <div className="badge">Lvl {gameLevel} Adventure</div>
                                <div className="event-card">
                                    <h3>Arrival Year: {currentEvent?.year}</h3>
                                    <p>"{currentEvent?.text}"</p>
                                </div>

                                <div className="badge" style={{ background: isRarePending ? '#fbbf24' : '#0d9488', marginBottom: '1.5rem' }}>
                                    {isRarePending ? '⭐ RARE SCANNING...' : `Next Sticker: ${nextSticker}`}
                                </div>

                                <div className="clock-container">
                                    <AnalogueClock hour={targetTime.h} minute={targetTime.m} />
                                </div>

                                <div className="time-entry">
                                    <div className="time-box">
                                        <div className="time-label">Hour</div>
                                        <input ref={hRef} type="number" className="massive-input" value={userInput.h} onChange={e => { const v = e.target.value.slice(-2); setUserInput(p => ({ ...p, h: v })); if (v.length >= 1) mRef.current?.focus(); }} onKeyDown={e => e.key === 'Enter' && checkAnswer()} />
                                    </div>
                                    <span className="colon">:</span>
                                    <div className="time-box">
                                        <div className="time-label">Mins</div>
                                        <input ref={mRef} type="number" className="massive-input" value={userInput.m} onChange={e => setUserInput(p => ({ ...p, m: e.target.value.slice(-2) }))} onKeyDown={e => e.key === 'Enter' && checkAnswer()} />
                                    </div>
                                </div>

                                <div className="feedback-area">
                                    {status === 'correct' && (
                                        <div className="feedback show correct">
                                            <div className="feedback-emoji">{nextSticker}</div>
                                            <div className="feedback-msg">Time Log Verified! 🕰️</div>
                                            <button className="next-btn" onClick={nextQuestion}>Next Time Jump →</button>
                                        </div>
                                    )}
                                    {status === 'incorrect' && (
                                        <div className="feedback show wrong">
                                            <div className="feedback-emoji">🤔</div>
                                            <div className="feedback-msg">Not quite! Check the hands!</div>
                                        </div>
                                    )}
                                </div>

                                {status === 'playing' && <button className="check-btn" onClick={checkAnswer}>Verify Time 📅</button>}
                            </div>
                        )}
                    </div>

                    {showRare && rareInfo && (
                        <div className="rare-banner show">
                            <div className="rare-inner">
                                <span style={{ fontSize: '7rem', display: 'block' }}>{rareInfo.emoji}</span>
                                <h2 style={{ fontSize: '2rem', fontWeight: 900, margin: '1rem 0' }}>RARE FIND!</h2>
                                <p style={{ fontSize: '1.5rem', fontWeight: 800, opacity: 0.9 }}>{rareInfo.name}</p>
                                <button className="check-btn" onClick={() => setShowRare(false)} style={{ background: '#064e3b' }}>Amazing! 🎉</button>
                            </div>
                        </div>
                    )}

                    {flashEmoji && (
                        <div id="sticker-flash-overlay" className="animate-sticker-pop">
                            {flashEmoji}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
