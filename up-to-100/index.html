<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie's Quest - Up to 100 👑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX support in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 4rem;
            color: #1f2937;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid #bbf7d0;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #059669;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #f0fdf4;
            border-radius: 9999px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #065f46;
            border: 2px solid #bbf7d0;
        }

        .header-stickers {
            display: flex;
            gap: 0.3rem;
            font-size: 1.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #065f46;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .back-btn:hover {
            color: #059669;
        }

        /* Progress */
        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.9rem;
            color: #065f46;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .progress-bar {
            background: white;
            border: 4px solid #bbf7d0;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        /* Stickers */
        .stickers {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 4px solid #f0fdf4;
            display: none;
        }

        .stickers.visible {
            display: block;
        }

        .stickers-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #10b981;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sticker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 2rem;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            outline: 4px solid #bbf7d0;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: #059669;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.9rem;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        /* Question */
        .equation-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .num-big {
            font-size: 5rem;
            font-weight: 900;
            color: #1f2937;
            line-height: 1;
        }

        .op-big {
            font-size: 4rem;
            font-weight: 900;
            color: #9ca3af;
        }

        .target-big {
            font-size: 5rem;
            font-weight: 900;
            color: #10b981;
        }

        /* Inputs */
        .inputs-row {
            display: flex;
            gap: 1rem;
            background: #f0fdf4;
            padding: 1.5rem;
            border-radius: 2rem;
            border: 4px solid #bbf7d0;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .input-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #059669;
            text-transform: uppercase;
        }

        .massive-input {
            width: 5rem;
            height: 7rem;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            border: 4px solid #bbf7d0;
            border-radius: 1.5rem;
            color: #065f46;
            outline: none;
            transition: all 0.2s;
        }

        .massive-input:focus {
            border-color: #059669;
            background: white;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
        }

        .massive-input::-webkit-inner-spin-button,
        .massive-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Feedback */
        .feedback-area {
            margin-top: 2rem;
            min-height: 60px;
        }

        .feedback {
            border-radius: 1.5rem;
            padding: 1.2rem;
            text-align: center;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #f0fdf4;
            border: 3px solid #86efac;
            color: #16a34a;
        }

        .feedback.wrong {
            background: #fef2f2;
            border: 3px solid #fca5a5;
            color: #dc2626;
        }

        .feedback-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.3rem;
        }

        .feedback-msg {
            font-size: 1.2rem;
            font-weight: 900;
        }

        /* Buttons */
        .check-btn {
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: 900;
            background: #059669;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 1rem 3rem;
            box-shadow: 0 6px 0 #064e3b;
            text-transform: uppercase;
            margin-top: 1.5rem;
            transition: all 0.1s;
        }

        .check-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #064e3b;
        }

        .next-btn {
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 900;
            background: #059669;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 9999px;
            padding: 0.8rem 2.5rem;
            box-shadow: 0 4px 0 #064e3b;
            margin-top: 1.5rem;
            text-transform: uppercase;
        }

        /* Celebration & Rare */
        #sticker-flash-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            display: none;
        }

        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 4000;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 150, 105, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .celebration.show {
            display: flex;
        }

        .celebration-emoji {
            font-size: 8rem;
            margin-bottom: 1rem;
        }

        .sticker-reward {
            font-size: 6rem;
            margin: 1.5rem 0;
        }

        .rare-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .rare-banner.show {
            display: flex;
        }

        .rare-inner {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: 8px solid white;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 0 60px rgba(251, 191, 36, 0.6);
        }

        #root {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Strategy Section */
        .strategy-wrap {
            margin-top: 2rem;
            background: #f0fdf4;
            padding: 2rem;
            border-radius: 2rem;
            border: 4px solid #bbf7d0;
            width: 100%;
        }

        .strategy-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #065f46;
            margin-bottom: 1.5rem;
        }

        .strategy-btns {
            display: grid;
            gap: 1rem;
        }

        .strat-btn {
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 800;
            background: white;
            color: #065f46;
            border: 4px solid #bbf7d0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .strat-btn:hover {
            background: #f0fdf4;
            transform: translateY(-3px);
            box-shadow: 0 4px 0 #bbf7d0;
        }

        @keyframes sticker-pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .animate-sticker-pop {
            display: block !important;
            animation: sticker-pop 1.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-btn">← Back to All Games</a>
    <div id="root"></div>

    <script type="text/babel" src="game.js"></script>

    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
