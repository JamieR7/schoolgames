<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 Maths Challenge Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f4ff;
            background-image: radial-gradient(#dcfce7 2px, transparent 2px);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 4rem;
            color: #1e293b;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 4px solid #c084fc;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #7c3aed;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #fdf4ff;
            border-radius: 9999px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            font-weight: 800;
            color: #6d28d9;
            border: 2px solid #e9d5ff;
        }

        .header-stickers {
            display: flex;
            gap: 0.3rem;
            font-size: 1.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #6d28d9;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 0.9rem;
            color: #7c3aed;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .progress-bar {
            background: white;
            border: 4px solid #e9d5ff;
            border-radius: 9999px;
            height: 1.5rem;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s ease;
        }

        .stickers {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border: 4px solid #ddd6fe;
            display: none;
        }

        .stickers.visible {
            display: block;
        }

        .stickers-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #8b5cf6;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sticker-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 2rem;
        }

        .card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 8px solid white;
            outline: 4px solid #e9d5ff;
            text-align: center;
        }

        .q-number {
            display: inline-block;
            background: #7c3aed;
            color: white;
            border-radius: 9999px;
            padding: 0.2rem 0.8rem;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .question-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        .question-context {
            background: #f3f4f6;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .choice-btn {
            font-family: inherit;
            background: white;
            border: 3px solid #e2e8f0;
            padding: 1.2rem 1rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #475569;
        }

        .choice-btn:hover {
            border-color: #7c3aed;
            background: #f5f3ff;
            transform: translateY(-2px);
        }

        .choice-btn.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }

        .choice-btn.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        .choice-btn.reveal {
            border-color: #22c55e;
            color: #166534;
        }

        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 1.5rem;
            display: none;
        }

        .feedback-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .feedback-msg {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .feedback-explain {
            font-size: 1rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 1rem;
        }

        .btn-next {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 1.5rem;
            cursor: pointer;
            margin-top: 1.5rem;
            box-shadow: 0 6px 0 #5b21b6;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5b21b6;
        }

        #sticker-flash-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            display: none;
        }

        #fw-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 4000;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(124, 58, 237, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .celebration.show {
            display: flex;
            animation: fadeIn 0.5s forwards;
        }

        .celebration-emoji {
            font-size: 8rem;
            margin-bottom: 1rem;
        }

        .celebration-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            color: #fdf4ff;
        }

        .sticker-reward {
            font-size: 6rem;
            margin: 1.5rem 0;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .rare-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .rare-banner.show {
            display: flex;
            animation: fadeIn 0.4s forwards;
        }

        .rare-inner {
            background: linear-gradient(135deg, #7c3aed, #4c1d95);
            border: 6px solid #fbbf24;
            border-radius: 3rem;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
        }

        .rare-emoji-big {
            font-size: 7rem;
            display: block;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes sticker-pop {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Maths Trivia 🧠</h1>
        <div class="stats">
            <div class="header-stickers" id="header-stickers"></div>
            <div class="stat-pill"><span>⭐</span><span id="score">0</span></div>
            <div class="stat-pill"><span>🏆</span><span id="streak">0</span></div>
        </div>
    </header>
    <a href="../index.html" class="back-btn">← Home</a>
    <div class="progress-wrap">
        <div class="progress-label"><span id="progress-text">Collecting: Stars ⭐</span><span id="progress-count">0 /
                5</span></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
    </div>
    <div class="stickers" id="sticker-book">
        <div class="stickers-label">Knowledge Collection:</div>
        <div class="sticker-row" id="sticker-row"></div>
    </div>
    <div class="card" id="game-area">
        <div class="q-number" id="q-number">Question 1 of 10</div>
        <div class="question-emoji" id="q-emoji">🧠</div>
        <div class="question-text" id="question-text">Loading question...</div>
        <div class="question-context" id="question-context" style="display:none;"></div>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback">
            <div class="feedback-emoji" id="feedback-emoji">✨</div>
            <div class="feedback-msg" id="feedback-msg" style="font-weight:900; margin:1rem 0;">Correct!</div>
            <div class="feedback-explain" id="feedback-explain"></div>
            <button class="btn-next" onclick="nextQuestion()">NEXT QUESTION</button>
        </div>
        <button class="choice-btn" id="skip-btn" onclick="skipQuestion()"
            style="margin-top:1rem; width:100%; border-style:dashed; padding:0.6rem;">Skip Question</button>
    </div>
    <div class="card" id="finish-card" style="display:none;">
        <div class="celebration-emoji">🏁</div>
        <h2 style="font-size:2.5rem; font-weight:900; margin-bottom:1rem; color:#7c3aed;">QUIZ OVER!</h2>
        <div style="font-size:1.5rem; font-weight:800; margin-bottom:2rem;">Your score: <span id="final-score">0</span>
        </div>
        <div id="final-msg" style="font-size:1.2rem; font-weight:700; color:#4b5563; margin-bottom:2rem;"></div>
        <button class="btn-next" onclick="startQuiz()">PLAY AGAIN</button>
    </div>
    <canvas id="fw-canvas"></canvas>
    <div id="sticker-flash-overlay"></div>
    <div class="celebration" id="celebration">
        <div class="celebration-emoji" id="cel-emoji">🏆</div>
        <div class="celebration-title">Knowledge Unlocked! 🎉</div>
        <div class="celebration-sub" id="cel-sub">You earned a new brain badge!</div>
        <div class="sticker-reward" id="cel-sticker">⭐</div>
        <button class="btn-next" onclick="afterCelebration()" style="box-shadow:none;">Keep Going! 🚀</button>
    </div>
    <div class="rare-banner" id="rare-banner">
        <div class="rare-inner">
            <span class="rare-emoji-big" id="rare-emoji">💎</span>
            <div class="rare-title" style="color:#fbbf24; font-size:2.5rem; font-weight:900;">RARE BADGE!</div>
            <div class="rare-subtitle" id="rare-name" style="font-size:1.5rem; font-weight:800; margin-bottom:1rem;">
                Diamond</div>
            <div class="rare-hint" style="font-size:1rem; font-weight:700; opacity:0.9; margin-bottom:2rem;">This one
                doesn't show up often — you're lucky! 🍀</div>
            <button class="btn-next" onclick="closeRare()"
                style="box-shadow:none; background:#fbbf24; color:#1e293b; padding:1rem 3.5rem;">Amazing! 🎉</button>
        </div>
    </div>

    <script>
        const THEMES = [
            { name: 'Real Madrid', emoji: '🏆', stickers: ['⚽', '🏟️', '🥅', '👟', '🏆', '🧤', '🥇', '📣', '🎽', '🧣', '🎖️', '🔵', '⬜', '🌟', '🎯'] },
            { name: 'Beyblade', emoji: '🌪️', stickers: ['🌪️', '💥', '🌀', '⚙️', '🔧', '🔥', '💫', '🛸', '🎯', '💿', '🔩', '🎪', '🎰'] },
            { name: 'Bruno', emoji: '🐶', stickers: ['🐶', '🦴', '🎾', '🐾', '🐕', '🥩', '🦮', '🥎', '🛋️', '🚿', '🐕‍🦺', '🌿', '🏡', '🎀', '🐩'] },
            { name: 'Judo Master', emoji: '🥋', stickers: ['🥋', '💪', '🥇', '🤸', '⛩️', '🇯🇵', '🧘', '🏆', '💯', '🎖️', '🏯', '🌸', '🥁', '🎍'] },
            { name: 'Agent P', emoji: '🦆', stickers: ['🦆', '🎩', '🎸', '🛠️', '🧪', '🎢', '📻', '🗺️', '⚙️', '🔩', '🔬', '🧲', '📡', '🎬', '🛩️'] },
            { name: 'Space', emoji: '🚀', stickers: ['🚀', '🌍', '🌙', '⭐', '🛸', '☄️', '🪐', '👨‍🚀', '🌠', '🔭', '🛰️', '💫', '🌌', '🌟'] },
        ];
        const RARE_STICKERS = [
            { emoji: '💎', name: 'Diamond' }, { emoji: '👑', name: 'Crown' },
            { emoji: '🐉', name: 'Dragon' }, { emoji: '🌈', name: 'Rainbow' }, { emoji: '🔮', name: 'Crystal Ball' },
            { emoji: '🍀', name: 'Lucky Clover' }, { emoji: '🦅', name: 'Eagle' }, { emoji: '🎆', name: 'Fireworks' },
            { emoji: '⚡', name: 'Lightning Bolt' }, { emoji: '🌙', name: 'Golden Moon' }, { emoji: '🎭', name: 'Magic Mask' },
            { emoji: '🐋', name: 'Blue Whale' }, { emoji: '🌋', name: 'Volcano' },
        ];
        const RARE_CHANCE = 0.2;

        function pickSticker() {
            if (Math.random() < RARE_CHANCE) {
                const rareOwned = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
                const available = RARE_STICKERS.filter(s => !rareOwned.includes(s.emoji));
                const pool = available.length > 0 ? available : RARE_STICKERS;
                const r = pool[Math.floor(Math.random() * pool.length)];
                if (!rareOwned.includes(r.emoji)) {
                    rareOwned.push(r.emoji);
                    sessionStorage.setItem('stickers_rare', JSON.stringify(rareOwned));
                }
                setTimeout(() => showRareBanner(r), 500);
                return r.emoji;
            }
            const theme = THEMES[level % THEMES.length];
            return theme.stickers[Math.floor(Math.random() * theme.stickers.length)];
        }

        function showRareBanner(r) {
            document.getElementById('rare-emoji').textContent = r.emoji;
            document.getElementById('rare-name').textContent = r.name;
            document.getElementById('rare-banner').classList.add('show');
            launchFireworks();
            playRareFanfare();
        }

        function playRareFanfare() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    gain.gain.setValueAtTime(0.2, now + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.1) + 0.3);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.3);
                });
            } catch (e) { }
        }

        function showStickerFlash(emoji) {
            const overlay = document.getElementById('sticker-flash-overlay');
            overlay.textContent = emoji;
            overlay.style.display = 'block';
            overlay.style.opacity = '1';
            overlay.style.animation = 'sticker-pop 1.5s ease-out forwards';
            setTimeout(() => {
                overlay.style.display = 'none';
                overlay.style.animation = '';
            }, 1500);
        }

        function closeRare() {
            document.getElementById('rare-banner').classList.remove('show');
            stopFireworks();
        }

        let fwAnim = null, fwParticles = [], fwInterval = null;
        function fwBurst(canvas) {
            const colors = ['#fbbf24', '#ec4899', '#3b82f6', '#10b981', '#f97316', '#8b5cf6', '#ef4444', '#fff'];
            for (let i = 0; i < 8; i++) {
                const cx = Math.random() * canvas.width, cy = Math.random() * canvas.height * 0.7;
                for (let j = 0; j < 55; j++) {
                    const angle = (j / 55) * Math.PI * 2, spd = 2 + Math.random() * 7;
                    fwParticles.push({ x: cx, y: cy, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, alpha: 1, color: colors[Math.floor(Math.random() * colors.length)], r: 2 + Math.random() * 4 });
                }
            }
        }
        function launchFireworks() {
            const canvas = document.getElementById('fw-canvas');
            if (!canvas) return;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            fwParticles = []; fwBurst(canvas);
            function tick() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                fwParticles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= 0.005;
                    ctx.globalAlpha = Math.max(0, p.alpha); ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = 1;
                fwParticles = fwParticles.filter(p => p.alpha > 0);
                fwAnim = requestAnimationFrame(tick);
            }
            if (fwAnim) cancelAnimationFrame(fwAnim);
            fwAnim = requestAnimationFrame(tick);
            if (fwInterval) clearInterval(fwInterval);
            fwInterval = setInterval(() => fwBurst(canvas), 800);
        }
        function stopFireworks() {
            if (fwInterval) { clearInterval(fwInterval); fwInterval = null; }
            if (fwAnim) { cancelAnimationFrame(fwAnim); fwAnim = null; }
            const c = document.getElementById('fw-canvas');
            if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
            fwParticles = [];
        }

        const ALL_QUESTIONS = [
            { emoji: '🍕', text: 'Freesper ate ½ of a pizza. Chama ate ¾ of the same sized pizza. Who ate more?', choices: ['Freesper', 'Chama', 'They ate the same', 'Cannot tell'], answer: 1, explain: '¾ > ½ because the numerator (top number) is bigger when the denominator is the same.' },
            { emoji: '🥛', text: 'Ruby drank ⅙ of her glass of milk. What fraction is still in the glass?', choices: ['⅚', '⅔', '⅕', '½'], answer: 0, explain: 'The whole glass is 6/6. 6/6 – 1/6 = 5/6 remains.' },
            { emoji: '🍫', text: 'Zolan has ⅗ of a chocolate bar left. He eats another ⅕. What fraction is left?', choices: ['⅕', '⅖', '⅘', '4/10'], answer: 1, explain: '3/5 – 1/5 = 2/5. Subtract the numerators when the denominator is the same.' },
            { emoji: '🍰', text: 'A cake is cut into 8 equal slices. Archie eats 3 slices. What fraction has he eaten?', choices: ['3/5', '3/8', '5/8', '⅜'], answer: 3, explain: '3 out of 8 slices = 3/8. Both C and D show the same fraction — ⅜ = 3/8.' },
            { emoji: '🎯', text: 'Which fraction is equivalent to ½?', choices: ['3/5', '4/10', '2/6', '3/6'], answer: 3, explain: '3/6 simplifies to ½ by dividing both numbers by 3.' },
            { emoji: '🍕', text: 'Which is the smallest fraction?', choices: ['¾', '⅔', '½', '⅕'], answer: 3, explain: '⅕ = 0.2, ½ = 0.5, ⅔ ≈ 0.67, ¾ = 0.75. So ⅕ is the smallest.' },
            { emoji: '📏', text: 'Order these from smallest to largest: ¼, ½, ⅛, ¾', choices: ['⅛, ¼, ½, ¾', '¼, ⅛, ½, ¾', '½, ¼, ⅛, ¾', '¾, ½, ¼, ⅛'], answer: 0, explain: '⅛=0.125, ¼=0.25, ½=0.5, ¾=0.75. So smallest to largest: ⅛, ¼, ½, ¾.' },
            { emoji: '🍊', text: 'There are 12 oranges. Ruby takes ⅓ of them. How many does she take?', choices: ['3', '4', '6', '8'], answer: 1, explain: '12 ÷ 3 = 4.' },
            { emoji: '🍬', text: 'Dario has 20 sweets. He gives ¼ to Archie. How many does he give away?', choices: ['4', '5', '10', '15'], answer: 1, explain: '20 ÷ 4 = 5.' },
            { emoji: '🚲', text: 'A bike costs £120. It is in a sale for ½ price. How much is it now?', choices: ['£40', '£60', '£80', '£100'], answer: 1, explain: '120 ÷ 2 = 60.' },
            { emoji: '🏀', text: 'What is the value of the 5 in 1,523?', choices: ['5', '50', '500', '5,000'], answer: 2, explain: 'The 5 is in the hundreds column.' },
            { emoji: '🥎', text: 'Round 47 to the nearest 10.', choices: ['40', '45', '50', '60'], answer: 2, explain: '47 is closer to 50 than 40. Remember, 5 or more rounds up!' },
            { emoji: '💎', text: 'What is the missing number: 2, 4, 6, 8, __?', choices: ['9', '10', '11', '12'], answer: 1, explain: 'The sequence goes up by 2 each time.' },
            { emoji: '📦', text: 'Which of these is a square number?', choices: ['7', '8', '9', '10'], answer: 2, explain: '3 x 3 = 9.' },
            { emoji: '🎈', text: 'Calculate: 7 x 8', choices: ['49', '54', '56', '63'], answer: 2, explain: '7 x 8 = 56.' },
            { emoji: '🍭', text: 'If a pack of 4 lollipops costs £2, how much is 1 lollipop?', choices: ['20p', '40p', '50p', '60p'], answer: 2, explain: '£2.00 ÷ 4 = 50p.' },
            { emoji: '👟', text: 'How many sides does a hexagon have?', choices: ['5', '6', '7', '8'], answer: 1, explain: 'Hex means six.' },
            { emoji: '📐', text: 'What is the perimeter of a square with 5cm sides?', choices: ['10cm', '15cm', '20cm', '25cm'], answer: 2, explain: 'Perimeter is the distance all the way around: 5 + 5 + 5 + 5 = 20cm.' },
            { emoji: '🏔️', text: 'An angle of 90 degrees is called a:', choices: ['Acute angle', 'Obtuse angle', 'Right angle', 'Straight line'], answer: 2, explain: 'The corner of a square is 90°, which is a right angle.' },
            { emoji: '⚽', text: 'How many grams are in 1 kilogram?', choices: ['10g', '100g', '1,000g', '10,000g'], answer: 2, explain: 'Kilo means one thousand.' },
            { emoji: '🕛', text: 'What is 15:30 in 12-hour clock time?', choices: '3:30 AM', choices: ['1:30 PM', '3:30 PM', '5:30 PM', '3:30 AM'], answer: 1, explain: 'Subtract 12 from hours over 12: 15 – 12 = 3.' },
            { emoji: '🥤', text: 'A bottle holds 2 litres. How many 500ml glasses can you fill?', choices: ['2', '4', '8', '10'], answer: 1, explain: '2 litres = 2,000ml. 2,000 ÷ 500 = 4.' },
            { emoji: '🔢', text: 'What is 100 – 37?', choices: ['63', '73', '53', '67'], answer: 0, explain: '70 + 30 = 100, so 60 + 40 = 100. 100 – 37 = 63.' },
            { emoji: '🧪', text: 'What is double 45?', choices: ['80', '85', '90', '100'], answer: 2, explain: '45 + 45 = 90.' },
            { emoji: '🌓', text: 'What is half of 70?', choices: ['30', '35', '40', '45'], answer: 1, explain: '70 ÷ 2 = 35.' },
            { emoji: '🏗️', text: 'What is 10 x 10 x 10?', choices: ['30', '100', '1,000', '10,000'], answer: 2, explain: '10 x 10 = 100. 100 x 10 = 1,000.' },
            { emoji: '🧊', text: 'How many faces does a cube have?', choices: ['4', '6', '8', '12'], answer: 1, explain: 'Think of a dice — it goes up to 6!' },
            { emoji: '🚂', text: 'A train leaves at 10:15 and arrives at 11:05. How long was the journey?', choices: ['40 mins', '50 mins', '55 mins', '60 mins'], answer: 1, explain: 'From 10:15 to 11:00 is 45 mins. 45 + 5 more mins = 50 mins.' },
            { emoji: '🧲', text: 'What is 25 x 4?', choices: ['75', '100', '125', '150'], answer: 1, explain: 'Four quarters of anything make a whole hundred.' },
            { emoji: '🌡️', text: 'Water freezes at what temperature in Celsius?', choices: ['-10°C', '0°C', '32°C', '100°C'], answer: 1, explain: '0°C is the freezing point of water.' },
            { emoji: '🪁', text: 'Which shape has 4 equal sides but NO right angles?', choices: ['Square', 'Rectangle', 'Rhombus', 'Trapezium'], answer: 2, explain: 'A rhombus is like a tilted square.' },
            { emoji: '🥧', text: '3/4 of 40 is:', choices: ['10', '20', '30', '35'], answer: 2, explain: '1/4 of 40 is 10. 10 x 3 = 30.' },
            { emoji: '🐾', text: 'How many legs do 15 spiders have?', choices: ['80', '100', '120', '150'], answer: 2, explain: '15 x 8 = 120.' },
            { emoji: '🚀', text: 'Light travels at about 300,000 kilometers per second. How far does it travel in 10 seconds?', choices: ['3,000 km', '30,000 km', '3,000,000 km', '30,000,000 km'], answer: 2, explain: '300,000 x 10 = 3,000,000.' },
            { emoji: '🪐', text: 'If Saturn has 82 moons and Jupiter has 79, how many more moons does Saturn have?', choices: ['2', '3', '4', '5'], answer: 1, explain: '82 – 79 = 3.' },
            { emoji: '🕰️', text: 'How many seconds in 5 minutes?', choices: ['200', '250', '300', '350'], answer: 2, explain: '5 x 60 = 300.' },
            { emoji: '🥨', text: 'What is 0.5 as a fraction?', choices: ['1/5', '1/2', '1/4', '5/10'], answer: 1, explain: '0.5 is exactly half.' },
            { emoji: '🛒', text: 'You buy 3 apples for 40p each and 2 pears for 50p each. Total?', choices: ['£1.20', '£1.90', '£2.20', '£2.50'], answer: 2, explain: '(3x40) + (2x50) = 120 + 100 = 220p = £2.20.' },
            { emoji: '🌊', text: 'A swimming pool is 25m long. How many lengths for 1km?', choices: ['20', '40', '50', '100'], answer: 1, explain: '1,000m ÷ 25m = 40.' },
            { emoji: '📐', text: 'The sum of angles in a triangle is always:', choices: ['90°', '180°', '270°', '360°'], answer: 1, explain: 'Triangle angles always add up to a straight line: 180°.' },
            { emoji: '🍕', text: '1/8 of a pizza is what percentage?', choices: ['10%', '12.5%', '15%', '25%'], answer: 1, explain: '1/4 is 25%, so 1/8 is half of that: 12.5%.' },
            { emoji: '🏢', text: 'A building has 12 floors. Each floor is 3m high. Total height?', choices: ['30m', '33m', '36m', '40m'], answer: 2, explain: '12 x 3 = 36.' },
            { emoji: '🔋', text: 'A phone battery is 20%. It gains 15% every hour of charging. How long to 100%?', choices: ['4 hours', '5 hours', '6 hours', '8 hours'], answer: 2, explain: 'Needs 80%. 80 ÷ 15 = 5.33 hours. So 6 hours to be safe!' },
            { emoji: '🗺️', text: 'On a map, 1cm = 5km. If two towns are 8cm apart, actual distance?', choices: ['35km', '40km', '45km', '50km'], answer: 1, explain: '8 x 5 = 40.' },
            { emoji: '🛸', text: 'What is the next prime number after 7?', choices: ['9', '11', '13', '15'], answer: 1, explain: 'Prime numbers only divide by 1 and themselves. 11 is the next.' },
            { emoji: '🎡', text: 'A wheel diameter is 100cm. What is the radius?', choices: ['25cm', '50cm', '75cm', '100cm'], answer: 1, explain: 'Radius is half the diameter.' },
            { emoji: '📉', text: 'What is 5% of 200?', choices: ['5', '10', '15', '20'], answer: 1, explain: '10% is 20, 5% is half: 10.' },
            { emoji: '🧪', text: 'Convert 1,500ml to litres.', choices: ['0.15L', '1.5L', '15L', '150L'], answer: 1, explain: '1,000ml = 1L. 1,500 ÷ 1,000 = 1.5.' },
            { emoji: '📊', text: 'The mean of 12, 15, 11, 14, 13 is:', choices: ['12', '12.5', '13', '14'], answer: 2, explain: 'Sum = 65. 65 ÷ 5 = 13.' },
            { emoji: '📅', text: 'How many days in 3 weeks and 4 days?', choices: ['21', '24', '25', '26'], answer: 2, explain: '21 + 4 = 25.' }
        ];

        let score = 0, streak = 0, progress = 0, level = 0;
        let stickers = JSON.parse(sessionStorage.getItem('stickers_quiz') || '[]');
        let answered = false, queuedQuestions = [], currentQIdx = 0, currentQ = null;
        const QUESTIONS_PER_ROUND = 10;

        function saveStickers() {
            sessionStorage.setItem('stickers_quiz', JSON.stringify(stickers));
            updateStickerHeader();
        }

        function updateStickerHeader() {
            const row = document.getElementById('header-stickers');
            if (!row) return;
            row.innerHTML = '';
            const rare = JSON.parse(sessionStorage.getItem('stickers_rare') || '[]');
            // Show last 5 stickers (mixed local and rare)
            const all = [...stickers, ...rare].slice(-5);
            all.forEach(s => {
                const span = document.createElement('span');
                span.textContent = s;
                row.appendChild(span);
            });
        }

        function updateProgressUI() {
            const theme = THEMES[level % THEMES.length];
            document.getElementById('progress-text').textContent = `Collecting: ${theme.name} ${theme.emoji}`;
            document.getElementById('progress-count').textContent = `${progress} / 5`;
            document.getElementById('progress-fill').style.width = `${(progress / 5) * 100}%`;
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function startQuiz() {
            score = 0; streak = 0; progress = 0; level = 0;
            stickers = []; saveStickers();
            document.getElementById('score').textContent = '0';
            document.getElementById('streak').textContent = '0';
            document.getElementById('sticker-book').className = 'stickers';
            document.getElementById('sticker-row').innerHTML = '';
            document.getElementById('finish-card').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('celebration').classList.remove('show');
            updateProgressUI();
            queuedQuestions = shuffle([...ALL_QUESTIONS]).slice(0, QUESTIONS_PER_ROUND);
            currentQIdx = 0;
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQIdx >= QUESTIONS_PER_ROUND) { showFinish(); return; }
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('skip-btn').style.display = 'block';
            answered = false;
            currentQ = queuedQuestions[currentQIdx];
            document.getElementById('q-number').textContent = `Question ${currentQIdx + 1} of ${QUESTIONS_PER_ROUND}`;
            document.getElementById('q-emoji').textContent = currentQ.emoji;
            document.getElementById('question-text').textContent = currentQ.text;
            const ctx = document.getElementById('question-context');
            if (currentQ.context) { ctx.textContent = currentQ.context; ctx.style.display = 'inline-block'; }
            else ctx.style.display = 'none';
            const choicesEl = document.getElementById('choices');
            choicesEl.innerHTML = '';
            currentQ.choices.forEach((c, i) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = c;
                btn.onclick = () => guess(i, btn);
                choicesEl.appendChild(btn);
            });
        }

        const CORRECT_MSGS = ['🎉 PERFECT!', '🔥 ON FIRE!', '⭐ Superstar!', '💯 Brilliant!', '🥇 Gold medal!', '🌟 Amazing!'];
        const WRONG_MSGS = ['Nearly! Check the explanation below 🔍', 'Not quite! 🧠', 'Good try! 📖'];

        function guess(idx, btn) {
            if (answered) return;
            answered = true;
            document.querySelectorAll('.choice-btn').forEach(b => b.onclick = null);
            document.getElementById('skip-btn').style.display = 'none';
            const feedback = document.getElementById('feedback');
            const fbEmoji = document.getElementById('feedback-emoji');
            const fbMsg = document.getElementById('feedback-msg');
            const fbExpl = document.getElementById('feedback-explain');

            if (idx === currentQ.answer) {
                score += 100; streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                btn.classList.add('correct');
                progress++; updateProgressUI();
                const s = pickSticker();
                stickers.push(s); saveStickers();
                showStickerFlash(s);
                const sp = document.createElement('span'); sp.textContent = s;
                document.getElementById('sticker-row').appendChild(sp);
                document.getElementById('sticker-book').classList.add('visible');
                feedback.className = 'feedback correct-fb';
                fbEmoji.textContent = s;
                fbMsg.textContent = CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)];
                fbExpl.textContent = currentQ.explain;
                feedback.style.display = 'block';

                if (progress >= 5) {
                    setTimeout(() => {
                        progress = 0;
                        const oldLevel = level; level++;
                        const celTheme = THEMES[oldLevel % THEMES.length];
                        document.getElementById('cel-emoji').textContent = celTheme.emoji;
                        document.getElementById('cel-sub').textContent = `You collected all ${celTheme.name} stickers!`;
                        document.getElementById('cel-sticker').textContent = celTheme.stickers[Math.floor(Math.random() * celTheme.stickers.length)];
                        updateProgressUI();
                        document.getElementById('game-area').style.display = 'none';
                        document.getElementById('celebration').classList.add('show');
                    }, 1000);
                    return;
                }
            } else {
                streak = 0;
                document.getElementById('streak').textContent = streak;
                btn.classList.add('wrong');
                document.querySelectorAll('.choice-btn')[currentQ.answer].classList.add('reveal');
                feedback.className = 'feedback wrong-fb';
                fbEmoji.textContent = '🤔';
                fbMsg.textContent = WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)];
                fbExpl.textContent = currentQ.explain;
                feedback.style.display = 'block';
            }
        }

        function nextQuestion() {
            currentQIdx++;
            loadQuestion();
        }

        function skipQuestion() {
            if (answered) return;
            nextQuestion();
        }

        function afterCelebration() {
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('game-area').style.display = 'block';
            currentQIdx++;
            loadQuestion();
        }

        function showFinish() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('finish-card').style.display = 'block';
            document.getElementById('final-score').textContent = score;
            const pct = Math.round((currentQIdx > 0 ? score / (currentQIdx * 100) : 0) * 100);
            let msg = pct >= 90 ? '🏆 Incredible! You\'re a Maths Champion!' :
                pct >= 70 ? '🌟 Great work — keep practising!' :
                    pct >= 50 ? '💪 Good effort! Try again to beat your score!' :
                        '📚 Have another go — you\'ll improve!';
            document.getElementById('final-msg').textContent = msg;
        }

        (function restoreStickers() {
            const saved = JSON.parse(sessionStorage.getItem('stickers_quiz') || '[]');
            if (saved.length > 0) {
                stickers = saved;
                const row = document.getElementById('sticker-row');
                stickers.forEach(s => {
                    const sp = document.createElement('span'); sp.textContent = s; row.appendChild(sp);
                });
                document.getElementById('sticker-book').classList.add('visible');
            }
            updateStickerHeader();
        })();
        startQuiz();
    </script>
</body>

</html>
